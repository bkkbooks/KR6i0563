front:
  text: 用圭峰圓覺修證義十二章頌分各成一頌鏡庵釋行霆序分説儀圓覺先須了説儀不同穢土混凡機婆伽梵主身全現大光明藏處希奇百千大士同斯會十二真人欲問時不二境中圓鏡像何殊光瑩淨琉璃頌文殊章妙德初徵本起因曾知離病可修真陀羅尼門周法界大圓覺海絶涯津無明夢裏迷緣影翳眼華中妄執身忽然夢醒翳華滅何曾動著本來人頌普賢章普賢次問漸修真通為三根審行門幻匪覺心心外物華非空性性中存覺心不動妄華寂妄境無生智孰論幻盡覺圓真體現灰飛煙滅火無因頌普眼章普眼圓融因果相身心影像體隨妄先了二空清淨門次修三觀圓頓行能所兼忘凡聖情愛憎寧復論差當曾知本有摩尼珠五色青黃焉可狀頌金剛藏章金剛執難聖凡身本悟緣何有妄因三問連環分別見諸門開喻性元真空華起滅元由妄金礦銷融永絶塵若要測量圓覺海入思惟地倍沉淪頌彌勒章彌勒推究輪回本若斷貪愛生死盡愛欲為因過既深愛命為果緣難泯二障就於五性分四生遂成六道蘊若親善友愛見亡自然悟入無生忍頌淨慧章淨慧倫排證悟人強分四位順天真凡賢聖果雖然異悟迷染淨與誰親先明依位循諸性次辨忘心頓證因一智了然超脫處有無情盡覺芽春頌威德章威德請開三種觀中根始此分章段四門開處任方來三類修時非雜亂靜鏡圓明全顯彰幻苗增長無涯畔器中鍠可喻禪那三法能起生死岸頌辨音章辨音又問幾般輪幾種修持可證真單復圓門雖有異靜幻寂觀要區分各安標記欲探結先慕求哀悔罪根二十五輪依幻覺無修習處示修因頌淨業章淨業斷除人我執俱緣四相妄迷習無明主宰為我根心存證者乃人立壽命業智潛續存衆生我人所不及由茲憎愛煩惱生死覺城昧此何能入頌普覺章普覺離病託師親當依端正知見人行住坐臥迹莫計作止任滅病非因自他除病不除法供事捨財及捨身憎愛直須無種子始於圓覺可修真頌圓覺章圓覺道場圓證悟下根於是開真路三期限量可隨宜四衆安居絶緣故以大圓覺為伽藍踞菩薩乘行願度曾知證入總該前諸佛共依如是住頌賢善首章善首流通正法門五名於是為區分十二部經真了義百千諸佛共談論佛境佛地已開演頓教機今得聞儻解百川歸大海何妨一法被多根頌判攝圭山才悟即流通却依賢首以弘宗傍探四疏明差當遍究群詮定有空頓教收經佛自判圓門兼屬義堪從若將經教論相攝克體全收終頓中十二章來意文殊章頓悟本有圓覺妙心本無無明生死方名信解成發起因普賢章以悟修之理難明故須徵釋令解用心普賢章開示身心無性二空理顯根塵諸法普淨普遍見境同佛剛藏章令深悟輪回分別邪正故乃徵釋彌勒章窮展轉根元推差別種性令斷貪愛淨慧章已知圓覺染淨無殊辨隨順修證威德章衆生根性不同煩惱厚薄不等立三觀門隨根趣入辨音章就前三觀示觀網交羅隨宜各契淨業章約計淺深分我四相若除我執便是圓覺普覺章由前除障修習用意依善知識免溺四病及諸細惑圓覺章道場克期加功用行以求證入上中下根普歸圓覺賢善首章正宗之法法義已周欲使廣益他方遠霑來世流傳通泰展轉無窮一部諸章大旨若是閲者預可知始末
