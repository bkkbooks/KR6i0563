body:
  text: 靜慧發生身心客塵從此永滅便能內發寂靜輕安此功成也前因澄息諸妄念方始知分別識心煩亂躁動不覺知停由是覺來覺去識心才靜即到極靜之境界靜才極便自然妙慧發生既妙慧發生則勘破六根六塵六識之妄法故云靜極光通達寂照含虗空却來觀世間猶如夢中事此之十八界非是主人公譬如行客出入無定若是主人本無攸往塵以坌污為義今既靜慧發生則一時捉敗故云永滅滅者無也如明來暗謝智起惑忘便能內發寂靜清虗輕安調暢此是於靜中得箇悟門如乾卦剛健中正可以辟邪降魔圓覺寂靜輕安可以存心入道良不虗矣由寂靜故十方世界諸如來心於中顯現如鏡中像此感應也由良寂靜之故遂得妙慧發生所以感應便見十方三世諸佛之心在行人心中顯現歷歷可見如鏡照像了了分明故云鏡明則像像歷然智顯則心心交徹永嘉又云心鏡明鑑無礙廓然瑩徹周沙界問行人入此觀悟明心地之後當知唯是一心心外更無境界今何却言十方如來之心來行人心中顯現耶答孟子云說詩者不以言害辭不以辭害志以意逆志為得之矣今此非謂有十方如來心來行人觀中現但是行人才明悟心地之後便知十方如來同信此心同解此心同修此心同悟此心即是於中顯現古云不煩問師匠心王應自知老氏云不出戶知天下不窺牗見天道同意問鏡中真箇有像否答云鏡中豈有像乎既云鏡中無像今何故見有耶答云雖然見有而脫體是空久已知矣何故現見耶既有像須有來處豈不見晦堂云鏡像若是有攬之不盈乎鏡像或謂無分明儼然圖今有何義故如此耶答今約慈恩宗法相家說者謂鏡之光明瑩淨孤潔不受外之光明然眼之光明亦瑩淨孤潔不受外之光明我將眼光去照彼時却被彼之光明倒射我眼光却自照見我面一似在鏡中然鏡本無像水中亦爾若無光明之物無所現之像即反是說矣此方便者名奢摩他此結觀名也梵語奢摩他此云止止即定謂止絶一切妄想境界觀法性諸空所以起信云若修止者住於靜處端坐正意不依氣息不依形色不依於空不依地水火風見聞覺知一切想念皆除亦遣除想當知唯心之外別無境界也善男子若諸菩薩悟淨圓覺萬物一體也現乎天地之間隨其所稟詫質起名故多分別返照歸源默而不怠其體也如鏡之明物來則現物去則淨了無罣閡其用也似圓月當空無所不照倘纖虗之所覆光不透通則陰矣以淨覺心知覺心性及與根塵皆因幻化心性依識識若不去熾然無著則心性無動六識才有所到即從六根隨六塵三和合有為幻化幻化者起滅也幻者起也化者滅也知起滅者淨覺心也即起諸幻以除幻者正明起行也諸幻即幻智也幻者即根本無明能幻之者除幻者依如幻始覺力分覺根本不覺始息滅相才息生想即是除幻變化諸幻而開幻衆隨機應化說法開示如幻衆生也若觀心者變起差別幻智遍觀八萬塵勞之衆一一稱真清淨非障非蔽即為開也由起幻故便能內發大悲根塵既消自他無二故能內發同體大悲輕安從性空起非是凡夫愛見故得輕安暢適此是閙處有箇悟門也一切菩薩從此起行漸次增進此結通也此明菩薩莫不皆從此幻觀門方能起於悲智乃至佛果也彼觀幻者非同幻故非同幻觀皆是幻故彼觀幻者即幻法非同幻觀即幻智此一段文恐有相濫故令揀之前文云即起諸幻以除幻者尚未幻智與真覺相去如何今揀去說使入此觀觀彼六根六塵六識皆是幻法此能觀之智不同前來幻法只此說不同底心又是虗幻故楞嚴云將欲復真欲真已非真真如性非真求復宛成非相真須和此知幻之心一時拂去幻相永離是諸菩薩所圓妙行如土長苗此總結也種喻覺心土喻幻法苗喻幻智謂此菩薩所以圓融修此觀妙行者乃是依妄起智入覺所以道太平本是將軍置不許將軍見太平譬如依土長苗棄苗收子法喻皎然也此方便者名三摩鉢提此結觀名也此即幻觀亦云三摩鉢底此云等至等謂齊等離沈掉故至謂至到到勝定故沈者乃是坐禪之時昏沈瞌睡也掉者乃是醒來舉心紛飛妄想也若於坐處不瞌睡者即離昏沈若於行處不紛飛攀緣逐物者即離掉舉既離昏沈掉舉方到得此觀勝妙之定處且前靜觀即門內做工夫此幻觀即門外千差萬別處做工夫何以知之起信云若修觀者當觀一切世間有為之法無得久停須臾變壞一切心行念念生滅應觀過去所念諸法恍惚如夢應觀現在所念諸法猶如電光應觀未來所念諸法猶如空雲欻爾而起應觀世間一切有身悉皆不淨種種穢污無一可樂如是常念一切衆生從無始來皆因無明所熏習故念念生滅已受一切身心大苦現在即本無量逼迫苦未來所苦亦無量難捨難離而不覺知衆生如是甚為可愍作是思惟即應勇猛發大誓願願令我心離分別故遍於十方修行一切諸善功德盡未來際以無量方便救拔一切苦惱衆生令得涅槃第一義樂此謂之修幻觀所以禪宗到此云雖然鼻孔遼天也要腳跟點地善男子若諸菩薩悟淨圓覺以淨覺心不取幻化及諸靜相了知身心皆為罣礙無知覺明不依諸礙永得超過礙無礙境受用世界及與身心相在塵域如器中鍠聲出于外煩惱涅槃不相留礙此下第三絶待靈心觀也先標本起行也既了悟覺悟次當起行謂了悟清淨本覺之心不取著第二三摩鉢提乃不取著第一奢摩他何故如是謂此之寂觀離前二觀處手中道到此境界便了達知覺四大妄身與緣影妄心並不是無為寂照虗通之理皆是能所障礙之境以了知是能身心是所才有能所有真妄並是障礙之法也無知覺者心緣曰知身觸曰覺既了知能所皆是罣礙之法若入此觀中境界便無能知所知所覺既無能所唯是一心此之一心明明不昧了了常知盡未來際常住不滅所以道心月孤明乾坤都一照此明之一字正顯靈妙絶待之體然此靈體之上上無頂下無底傍無邊中無在既無當中有何東西南北上下四維乎欲言空寂不似大虗欲言相用不同緣起欲言知見異於分別欲言質礙異於木石欲言其覺不同醒悟之初欲言其明不同日月之類肇云夫菩提之道高而無上廣不可極淵而無下深不可測大包天地細入無間故謂之道上引諸說只顯靈心絶待今此入觀恐知字引惹分別之心故本覺但云明不依諸礙即身心能所今不依者謂入此觀時更不依倚身心及能所直造靈明本覺禪宗謂之單刀直入獨步丹霄又如金翅鳥擘海直取龍吞寒山云男兒大丈夫作事莫鹵莾徑捷鐵石心直取菩提路邪道不須行行之轉辛苦言永得超過礙無礙境者永得乃究竟之辭超過迫殊對得礙即前幻觀此觀涉於煩惱無礙境者即前靜同於涅槃謂修此觀證入之時便永得超過前幻觀與靜觀之境界非唯超過前二觀和自己資緣所受用之物并國土世界一時超出既然一時超出之後又不可一向打淨潔毬子抱不哭孩兒一時空空去落在無事界中黑山下坐死水裏淹須知宛然依舊還他身有地水火風四大宛然還他心存見聞覺知此之六根六塵六識之相宛然只在塵域之中而此之靈明覺性出乎陰陽造化形名度數之外如金器中鐘之聲若一擊著則其聲鍠鍠出乎其外若到此境界之時且凡夫煩惱生死之法與聖人涅槃出世之法皆不能留滯障礙然此之涅槃屬理故云留煩惱屬事故云礙今先明鍠字初以唐韻未修故圭峰疏中准切韻訓樂不是器中聲今取其聲勢不取訓字此應是金石等器中聲相今且現聞擊鐘磬之聲其聲鍠鍠然即知鍠字是聲之相狀澤人四潤稍拙應云如金器聲鍠鍠出外故詩云鐘鼓鍠鍠其義可見也次取大鐘乃器中之大者其聲遠聞今見行廣韹再經修定故於注下添云大鐘也與疏正同意今文中正取大鐘而兼用聲相也後正釋喻旨以鍠喻世界身心聲喻於靈明觀智謂從器聲出器不能拘故聲聞四遠器局本處以喻觀智約身心修得身心所不能拘觀智廓爾無邊身心不離舊處但以法喻相當不必扄喻所依物也便能內發寂滅輕安妙覺隨順寂滅境界自他身心所不能及衆生壽命皆為浮想到此功成也功成之後不取靜相靜相即寂不取幻相幻相即滅便能內發離前二觀輕安得箇悟門才方悟入便與佛寂滅一心境界一般故云妙覺隨順此是在觀時同佛所以初地菩薩在觀同諸佛出觀同凡夫寂滅境界者一心也故楞伽云寂滅者名為一心非是息動之寂滅也自他身心所不能及者謂依體起智曰自根塵發識曰他若到此境不可以智知不可以識識故曰自他身心所不能及衆生壽命皆為浮想者回觀一切衆生所執我相人相衆生相壽者相皆是虗妄浮想之所執持其實本無實體故華嚴云一切衆生但想所持其猶空雲雲是空之浮氣了虗空者即知浮雲畢竟非空喻如衆生壽命是真上之浮想了真寂者即知衆生畢竟非真也此方便者名為禪那梵語禪那此云靜慮蓋靜是靜觀慮是幻觀若修此寂觀不即前二觀亦不離前二觀謂正當靜時不見有靜悄悄底相便如閙浩浩處然亦不妨全不靜處正當閙時不見有閙浩浩底相便如靜悄悄處然亦不妨全在閙處如是則在靜不見有靜靜只是渠謂之動靜一源往復無間何以知之疏云即慮而靜故無散動即當定義即靜而慮故非無記即當慧義定慧平等故曰禪那然此三觀若約所配亦有多說初觀即體次觀即用後觀即相若約悲智初觀即智次觀即悲後觀即悲智雙運若約定慧初即定次即慧後即定慧平等若約三諦初即真諦次即俗諦後即真俗不二第一義諦若約所照初照空次照有後不空不有也若天台教初即空觀次即假觀後即中觀若天台教約義理則同若約意趣則別此三觀明行人用心方便彼三觀則推窮諸法相又此多約心成行故不立所觀之境彼多約義生解故對觀所三諦也若約修初小乘次菩薩後佛若約對治初即對治凡夫著相次即對治小乘不發大悲後雙治凡夫小乘也又如弄珠吟云正當弄時其珠不住空不落地不在手既不在三處亦不住一處不住空中即喻不住空觀不落地上即喻不住假觀不在手裏即喻不住中觀既不住三亦不成一則非一非三而三而一斯為妙矣若約禪家譬如猫兒捉鼠相似若於穴前瞌睡之時則鼠出不知若於穴前叫喚之時則鼠亦不出唯是於穴前不睡不叫為得之矣穴前睡者即入靜觀而昏沈不得悟道穴前叫者即入幻觀而散亂亦不能悟不睡不叫者者即入後觀中非唯不昏沈亦不掉舉斯為得之矣此約前二不得意者形對而云若各得入處即成三觀耳善男子此三法門皆是圓覺親近隨順十方如來因此成佛十方菩薩種種方便一切同異皆依如是三種事業若得圓證即成圓覺此顯圓修也法門者指前三觀圓覺是一心之法門是三觀乃為圓覺之門戶蓋門有出入義悟此法即入此門迷此法即出此門然此三法門皆是依倚悟淨圓覺而起觀行觀行皆趣入圓覺始終不相捨離故云親近隨順然佛及菩薩同修此三觀同證此圓覺也然隨機隨事行相各異或多人同修一門或一人具修多行若三四五若千百種同之與異隨類難准然必皆依此三種事業也圓證者三觀齊修方得圓證若但修一者為偏矣善男子假使有人修於聖道教化成就百千萬億阿羅漢辟支佛果不如有人聞此圓覺無礙法門一剎那頃隨順修習此校量顯勝也梵語阿羅漢此有三義一無賊二應供三不生此乃第四果也梵語辟支迦此云獨覺亦謂之緣覺此是小乘中利根之人是二小乘所作已辦梵行已立不受後有永出三界具足六通八解且如勸得一人二人持於五戒十戒據諸經說福已甚多何況令爾許億人成就辟支羅漢之果此福與前之福譬如海形牛迹又不可以比校雖少然如是都不如有人暫得聞此十方諸佛廣大靈明圓覺大自在無障礙一心法門於剎那極促頃刻之間用不背心於聞思修三慧熏修習學圓覺之功德何故如是以此法門能令行人不歷三祇便登佛位如法華說龍女獻珠一生成佛也爾時世尊欲重宣此義而說偈曰威德汝當知無上大覺心本際無二相隨順諸方便其數即無量如來總開示便有三種類寂靜奢摩他如鏡照諸像如幻三摩提如苗漸增長禪那唯寂滅如彼器中鍠三種妙法門皆是覺隨順十方諸如來及諸大菩薩因此得成道三事圓證故名究竟涅槃偈文初七句標舉次六句頌三觀後七句引例於是辨音菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言佛以一音逗於萬類其所說法者說一乘法而衆生心地差別之故遂見佛所說之法各各不同如娑竭龍王一念降雨於一切處所見不同若大海中見雨清淨水名為無斷絶他化天雨簫笛乃種種音樂名為美妙化樂天雨大摩尼珠名為放大光明兜率天雨大莊嚴具名為乘髻夜摩天雨衆妙香名為悅意四天王天雨天寶衣名為䨱蓋龍王宮雨赤真珠名為涌出光明阿修宮雨諸兵仗名為降伏怨敵北單越雨種種華名曰開敷以龍王一味之雨各隨諸天所感不同今佛亦然但說一乘之法若聲聞在座之時其所聽者乃是四諦法若緣覺在座之時其所聽者乃十二因緣法若菩薩在座之時其所聽者乃六度萬行法然諸文但說一心法門隨衆生所聞時有差別今前門雖統明三觀而隨機單復不同故二十五輪各有證入此菩薩善能辨別隨類圓音故當其問也大悲世尊如是法門甚為希有此指前三觀法門甚是希奇少有也世尊此諸方便一切菩薩於圓覺門有幾修習涅也請法也此諸方便者即指前三觀於圓覺者指前所依了悟覺性之行本也有幾修習者謂前威德章中蒙佛開示三觀行相分明並已知了尚未審諸菩薩所修為復是一人具修三觀為復是三人各修一觀為前修為後修為同時修為不同時修為依次第為超次第故云有幾修習也意問威德章中三觀如何而修矣願為大衆及末世衆生方便開示令悟實相作是語已五體投地如是三請終而復始爾時世尊告辨音菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生問於如來如是修習汝今諦聽當為汝說時辨音菩薩奉教歡喜及諸大衆默然而聽無相之相故曰實相出體即圓覺也善男子一切如來圓覺清淨本無修習及修習者一切菩薩及末世衆生依於未覺幻力修習爾時便有二十五種清淨定輪此答文舉意標數也一切如來者即指三世諸佛與十方諸佛廣大靈明圓覺清淨體上本無所修之人既然無修無證因甚諸教所說一切菩薩及末代衆生又有修有證耶良由於本覺上一念不覺迷真背湛喪本受輪以諸佛所說者但依不覺故說有幻力修習遂有修有證此之修習以被機之故便有二十五種清淨定輪輪有權義謂能摧惑障令正智輪故名為輪言二十五輪者且初三觀單修次三七二十一輪交絡復修後一輪圓修三觀慤法師疏中於二十五觀約喻各立一名而圭峰疏中全用之以管經文令行相顯著若諸菩薩唯取極靜由靜力故永斷煩惱究竟成就不起于座便入涅槃此菩薩者名單修奢摩他若菩薩等此下二十五輪皆有標列結亦應一一標云悟淨圓覺以為起行所依之本今為前觀既標列有了今恐文繁故略不載又此三觀行相前已具釋了今但要分成二十五數被二十五種機并顯單復之相故略去不存今此澄渾息用觀也此觀譬如濁水先且澄令清潔清潔後則可於中以見於物今修此靜觀亦復如是謂行人自從無量劫來只用此無明煩惱一切業障妄想顛倒攀緣分別之心未曾暫歇今既入此觀當以定力止息調伏勿令再起如人執杖視牛勿犯人苗稼唯取極靜者此明一味靜念更不依倚形色不依地水火風及見聞覺知良由靜念沈慮之力遂覺身心悉皆空寂至於瞥爾之念尚無煩惱如何得有既煩惱不起即全是覺心故云究竟成就不起于座便入涅槃者謂不起當體法空之座便入諸佛寂滅涅槃真如理也若諸菩薩唯觀如幻以佛力故變化世界種種作用備行菩薩清淨妙行於陀羅尼不失寂念及諸靜慧此菩薩者名單修三摩鉢提此庖一恣刃觀也本出莊子養生篇彼文乃寓言一著者姓庖名丁為文慧君解牛三年之前所見無非是牛三年之後不見有全牛其殺牛之刀十九年更不曾少損有若新刃初發於硎石之上也夫牛之百體有離有合有曲有直有竅有穴至於毫毛之末莫不各有法界而況解於細骨之間獨無修理乎且離處因而離之合處因而合之曲處橫而理之直處從而通之有竅則行無竅則止若夫解牛至此則猶土解也始動而百已判矣尚何用力於其間哉若然則牛已不傷而刀復如故蓋牛譬於物也刀譬於生也善解牛者所解之牛雖衆而刀初不少損善遇物者所遇之物雖繁而生元不傷也十乃陰數九乃陽數此見其年歲之往已久也三年之前見牛者此不見道而見物也三年之後不見有全牛者此見道而不見物也夫以吾之一生而處於無窮事變之間苟非順性命之情以頤養之則殘生傷性伐德損壽與死為鄰其能久而精神不耗魂魄不勞乎據莊子之意以牛喻世上高名厚利及榮華富貴酒色財氣種種虗幻不實之物以刀喻吾之一身以一身順萬物凡事付之以自然不越性分之理者則能保養一身遠乎患難終乎天年盡其壽考不夭斤斧處於中道分經之意即不然以牛喻萬行以刀喻靈明觀智喻如菩薩入此觀時利益衆生廣修萬行應緣入俗種種施為於自己靈明觀智之上常明明常歷歷全超獨露初無虧缺一念不在家之時便是損己智刃故以庖丁恣刃譬之也經言佛力即覺悟之力備行菩薩清淨妙行者即戒廣度群品備學法門不失寂念者即定及諸靜慧即慧也若諸菩薩唯滅諸幻不取作用獨斷煩惱煩惱斷盡不假諸行也此正是絶待之義便證實相此明便證實相此菩薩者名單修禪那呈音出礙觀此前寂觀云如器中鍠聲出于外慤法師疏云如萬鈞之鏞星樓受礙搖杵一擊聲振寰宇自體兼他不能留礙豈以樓拘鐘相使響不通形礙管絃令音不透者也唯滅諸幻不取作用者以諸幻境無邊難可窮究故直云滅滅者絶念也作用施為又妨禪寂故云不取獨斷煩惱者者但與靈心本覺相應煩惱自無所有所斷既空無所有處即便是證悟此上靜幻寂三觀乃是單修然靜與寂何以異耶由靜是二乘境寂是佛境又靜是禪定寂是涅槃故不同也次二十一輪分為三類類各有七輪也第一先用靜觀為首幻觀與寂觀兼修乃是先修後修有二輪先修中修後修有二輪無修齊修後修有三輪共成七輪第二却用幻觀為首靜寂兼修亦是先修中修後修二輪先修齊修後修三輪共成七輪第三却用寂觀為首靜幻兼修如前次第也故共成三七二十一輪今當第一靜觀為首也若諸菩薩先取至靜以靜慧心照諸幻者便於是中起菩薩行此菩薩者名先修奢摩他後修三摩鉢提一運舟兼濟觀謂此菩薩修定以出塵即運舟發慧以化物即兼濟也先取至靜者標首由至虗極守靜篤也故此標靜觀為首以靜慧心從靜躡迹起行以者運也靜慧心者即舟也照諸幻者便於是中起菩薩行者此兼修幻觀若無靜則自居幻化何能照幻者而度脫之如舟自沈焉能救溺此菩薩者名先修奢摩他後修三摩鉢提即結名此是先修并後修第一輪也若諸菩薩以靜慧故證至靜性便斷煩惱永出生死此菩薩者名先修奢摩他後修禪那二湛海澄空觀湛海則波瀾不動先靜觀以反流澄空則水性清明後寂觀以顯性若諸菩薩以靜慧故靜也證至靜性性即寂也躡靜而兼修寂矣便斷煩惱永出生死二觀功用斷煩惱是因亡以出生死是果喪此菩薩者名先修奢摩他後修禪那此結名是先修及後修第二輪也若諸菩薩以寂靜慧復現幻力種種變化度諸衆生後斷煩惱而入寂滅此菩薩者名先修奢摩他中修三摩鉢提後修禪那三首羅三目觀也此三觀俱修如摩醯首羅面上三目若諸菩薩以寂靜慧靜也復現幻力種種變化度諸衆生幻也後斷煩惱而入寂滅寂也此菩薩者名先修奢摩他中修三摩鉢提後修禪那結名此是先修中修後修一輪也若諸菩薩以至靜力斷煩惱已後起菩薩清淨妙行度諸衆生此菩薩者名先修奢摩他中修禪那後修三摩鉢提四三點齊修觀也三點者梵書伊字也慤疏云一人具修三觀即名為齊非是同時若諸菩薩以至靜力靜也斷煩惱已寂也後起菩薩清淨妙行度諸衆生幻也煩惱既盡愛見已亡故所起行無不淨妙可解他縛此菩薩者是先修中後修第三輪也若諸菩薩以至靜力心斷煩惱復度衆生建立世界此菩薩者名先修奢摩他齊修三摩鉢提禪那五品字單雙觀也上單靜觀如上一口後雙明寂幻如下兩口故云單雙若諸菩薩以至靜力靜也心斷煩惱復度衆生建立世界此菩薩者名先修奢摩他齊修三摩鉢提禪那此乃齊兼幻寂也初句是靜後二句是幻寂也此是先修齊修後修第一輪也若諸菩薩以至靜力資發變化後斷煩惱此菩薩者名齊修奢摩他三摩鉢提後修禪那六雙頭獨足觀也白澤圖中有山精頭如鼓有兩面前後俱見此喻靜幻雙照二利齊運如雙頭也單寂觀如獨足也若諸菩薩以至靜力資發變化齊標靜幻以至靜力資助策發變化之力以度衆生也後斷煩惱此菩薩者名齊修奢摩他三摩鉢提後修禪那者此寂也前二利備故入中道此段與前段經文異前則靜獨為初後始兼寂幻此則靜與幻齊為初從始單修於寂也欲易見者前則上單下雙此則上雙下單此是齊修後始修第二輪也若諸菩薩以至靜力用資寂滅後起作用變化世界此菩薩者名齊修奢摩他禪那後修三摩鉢提七果落華敷觀既以靜定之樹結寂滅中道之果後華敷者復以幻觀入有情界度諸衆生同令獲得涅槃之果若諸菩薩以至靜力用資寂滅齊滅也後起作用變化世界此菩薩者名齊修奢摩他禪那後修三摩鉢提兼幻也此是齊修第三輪也次七輪一一標幻為首次兼餘二若諸菩薩以變化力種種隨順而取至靜此菩薩者名先修三摩鉢提後修奢摩他今初先武後文觀也謂武王先興兵收伐紂王之後倒載于戈歸馬於華山之陽放牛於桃林之野鑄戈戟為農器偃武修文也喻此菩薩先變化種種隨順度脫衆生已後入靜觀若諸菩薩以變化力種種隨順此標幻而取至靜此菩薩者名先修三摩鉢提後修奢摩他靜也此是先後第一輪也若諸菩薩以變化力種種境界而取寂滅此菩薩者名先修三摩鉢提後修禪那二功成退職觀也此喻如秀才及第之後於朝廷立大功成大名至於功成名遂身退拂衣皈間依前只是舊時秀才也喻菩薩發慧利物度生畢即是功成習寂內修名為退職若諸菩薩以變化力種種境界此幻也而取寂滅此菩薩者名先修三摩鉢提後修禪那兼寂也此是先後第二輪也若諸菩薩以變化力而作佛事安住寂靜而斷煩惱此菩薩者名先修三摩鉢提中修奢摩他後修禪那三幻師解術觀謂先起變化作術法後皈靜體寂故曰解術幻靜此是先中後一輪也若諸菩薩以變化力無礙作用斷煩惱故安住至靜此菩薩者名先修三摩鉢提中修禪那後修奢摩他四神龍隱海觀謂起幻化生如神龍布雲雨也歸體入靜如隱海也此先中後第二輪也若諸菩薩以變化力方便作用至靜寂滅二俱隨順此菩薩者名先修三摩鉢提齊修奢摩他禪那五龍樹通真觀也謂先起幻後皈靜寂如龍樹初行幻術廣化邪途後習真乘自階聖果其名龍樹者傳燈云西印度城北有大樹蔭覆五百大龍其樹王名龍樹常為衆說法初入佛道之時九十日念盡如來一代時教遂高聲唱言孰謂如來言教廣博遂入龍宮誦出下本華嚴十萬餘偈今現傳於世者也此先齊第一輪也若諸菩薩以變化力種種起用資於至靜後斷煩惱此菩薩者名齊修三摩鉢提奢摩他後修禪那六商那示相觀也商那和修即優波毱多之師也先以神力示相降伏毱多弟子慢心後乃入定皈寂此是齊後第二輪也若諸菩薩以變化力資於寂滅後住清淨無作靜慮此菩薩者名齊修三摩鉢提禪那後修奢摩他七大通宴默觀也大通如來即佛也先用利物後則皈寂此齊後第三輪也後七輪一一標寂為首次兼餘二若諸菩薩以寂滅力而起至靜住於清淨此菩薩者名先修禪那後修奢摩他今初寶明空海觀也佛頂經云同入如來寶明空海今靈心觀即本覺明如寶明也後靜觀如空海也又寶明即慧空海即修此是先第一輪也若諸菩薩以寂滅力而起作用於一切境寂用隨順此菩薩者名先修禪那後修三摩鉢提二虗空妙用觀也謂靈心之體如虗空起化即妙用此先後第二輪也若諸菩薩以寂滅力種種自性安於靜慮而起變化此菩薩者名先修禪那中修奢摩他後修三摩鉢提三舜若呈神觀也出楞嚴經舜若即虗空神遇日光映之暫現如修此觀先寂次靜後幻此先中後第一輪也若諸菩薩以寂滅力無作自性起於作用清淨境界皈於靜慮此菩薩者名先修禪那中修三摩鉢提後後修奢摩他四飲光皈定觀也即大迦葉亦云大龜氏昔為金師善明金性使其柔伏以金塗佛感得金色此觀先證體次起神通後乃皈定也此先中後第二輪也若諸菩薩以寂滅力種種清淨而住靜慮起於變化此菩薩者名先修禪那齊修奢摩他三摩鉢提五多寶呈通觀也以多寶佛先成道證真如體後於塔中發起出法華經中如靜幻無礙此是先齊第一輪也若諸菩薩以寂滅力資於至靜而起變化此菩薩者名齊修禪那奢摩他後修三摩鉢提六下方騰化觀也出法華六萬菩薩從下方現此是齊後第二輪也若諸菩薩以寂滅力資於變化而起至靜清明境慧此菩薩者名齊修禪那三摩鉢提後修奢摩他七帝青含變觀也出華嚴偈云譬如帝青寶照物皆同色衆生見佛時同佛菩薩色此寶含諸物像對即變應應而還空如靈心觀成包含德用應緣起幻而復安靜此是齊後第三輪也後一輪圓修三觀若諸菩薩以圓覺慧圓合一切於諸性相無離覺性此菩薩者名為圓修三種自性清淨隨順此名如意圓修觀如如意寶珠四方俱照大智頓覺三觀齊修然如意珠世人得者一切所欲皆如其意應心所求無不皆現今圓修此亦復如是於諸法中舉體相即無不全具於諸性者即靜觀相字即幻觀覺性即中道寂滅觀以圓覺慧圓合一切者此是從體起用於諸性相無離覺性者此是會皈體也謂若菩薩用廣大靈明圓覺之慧圓融和合一切或理或事或性或相或真或妄或色或空或本或末種種諸法舉體全真以何義故良由以覺合理理即非理故全即事又由以覺合事事即非事故全即理到此境界全理全事全性全相全真全妄全色全空全本全末全得全失全彼全此雙遮雙照體用無二寂照同時是為圓融無上妙覺此菩薩者下皆結名也善男子是名菩薩二十五輪一切菩薩修行如是若諸菩薩及末世衆生依此輪者當持梵行寂靜思惟求哀懺悔經三七日於二十五輪各安標記至心求哀隨手結取依結開示便知頓漸一念疑悔即不成就此總示修習梵行淨也此即戒學寂靜者此即定學思惟即慧學此是三無漏學也大凡學道之人莫不皆因三學而從凡入聖如莊子云宇泰定發乎天光與此同旨謂修此二十五輪之時於事相中威儀法式及用心方便必須持戒防非止惡入定對治動亂發慧辨邪別正是非真妄等法如是修行必定成佛儻若觀中有礙宜須於三七日中哀告投十方諸佛懺露先罪改往修來書寫二十五輪五字文句安置道場之中禮念䖍誠精祈一行若是於三觀之中已的樂修一觀者即便隨意修習更不必求若心於猶豫不決勝劣難分即當憑仗聖力以卜之不宜揀擇但依所捻結開而看之而頓漸自知休貪別觀若更懷疑則失前功不可等間輕於事相也爾時世尊欲重宣此義而說偈言辨音汝當知一切諸菩薩無礙清淨慧皆依禪定生所謂奢摩他三摩提禪那三法頓漸修有二十五種十方諸如來三世修行者無不因此法而得成菩提唯除頓覺人并法不隨順一切諸菩薩及末世衆生常當持此輪隨順勤修習依佛大悲力不久證涅槃偈中二偈標意及觀綱也次一偈結因後二偈揀示云唯除頓覺人并法不隨順此二句長行既無此偈即顯謂獨除却上根圓頓悟解之人并及於一切定相之法不隨順者則不必依二十五輪及道場探結等法不隨順者不取相也既不隨相即隨真覺此乃頓入圓明觸目合道遇緣即宗本自無傷不可加之以繩索也是知前普賢章知幻即離不作方便等類故揀之矣又下文云隨順勤修習者此指下根人前不隨即不隨倒法此不隨即不隨正法若下根之人其可不隨正法乎後六句總示也
