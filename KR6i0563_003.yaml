body:
  text: 云何無明此乃欲推窮妄宰故此一句徵問謂之連前起後之辭佛恐後代修行之人聞說永斷無明便謂實有無明可斷然此無明以癡為體雖有本覺光明而無始覺照了故曰無明除却無字只此一明字便是靈靈不昧了了常知之明才一念不覺面前不明只在黑地裏走便是無明大涅槃經云若與煩惱諸結俱者名為無明若與一切善法俱者名之為明華嚴經云第一義諦不了故名無明此之無明畢竟自何處起當如起信論說三細六粗從細至粗而起三細者一業相二轉相三現相六粗者一智相二相續相三計名相四執取相五起業相六業繫苦相謂才於本覺上一念動心不覺謂之業相才有所見謂之轉相境界現謂之現相此三細也起分別心謂之智相念念相續不斷謂之相續相此上五相皆為法執也於分別中此是名此是利此是善是惡此是親此是疏此是青黃赤白等謂之計名字相好之則喜惡之則嗔隨所好處而生執著之心謂之執取相此之二相即我執也既執物為我相就五蘊之上或嗔喜或打罵或更相殺害互為冤讎造種種惡謂之起業相既造惡業業果成就似鏡照像如影隨形便被業縛隨業受報於六道四生大苦海中無由解脫謂之業繫苦相也今經從云何無明已下經文直至輪轉生死三細六粗一時具足良由一念不覺便是無明此謂之獨頭無明橫從空起如天或雲如鏡忽塵更不假觸境遇緣善男子一切衆生從無始來種種顛倒猶如迷人四方易處此即按定其非也衆生者乃色受想行識五蘊衆緣和合而生蘊者以積聚為義或稱陰者以蓋覆為義且色以質礙為義受以領納為義想以取像為義行以遷流造作為義識以了別為義此衆生除去了悟覺性之人其餘一時收在裏許無始者以西天外道六師執一切法皆從冥諦出以為有始楞嚴中吾佛聖人為對治彼故說無始顛倒者此從喻得名顛即是首向上曰正向下曰倒此以喻說若以法說者心識狂亂曰顛背覺合塵曰倒倒有所執顛但荒狂莊子謂之倒置之民種種者非是一也若通說則不過是執我執法故曰種種若就今經則迷身迷心有四對何謂四對且四大非我執為我法身真我而不信此是第一對其次四大如幻本無而見有法身真實本有而見無此是第二對其次緣念生滅為真心真心了然而不自識此是第三對其次緣念如珠中黑色全空而執有真心如珠中明相實有而見無此是第四對第一第三對乃屬我執第二第四對乃屬法執既四對不同故曰種種又人之倒執其相非一楞嚴中謂執悟中迷號性顛倒皆同其義猶如迷人四方易處者上文先舉法以是舉喻四方即東西南北易者轉也改也處者所也上文徵起云何是衆生無明此便按定其非云一切四生九類衆生只緣自從無始曠大劫來與天地同生與日月並明與諸佛同體與萬像同源所以諸佛已成正覺而衆生輪轉者良由於十二時中心識狂亂甲徇小懷私背覺合塵離根失本種種取捨種種攀緣種種顛倒於一切時一切處無過是執我執法如人乍入川原之中忽然迷失道路將東作西以南為北是時東西不辨南北不分殊不知正迷之時方所只在舊處不曾移轉也妄認四大為自身相六塵緣影為自心相此即正釋其相也妄認者虗妄執認四大者地水火風六塵者色聲香味觸法緣影即是六識此是於六塵境上起能攀緣之妄心非是真心但是攬塵成體如身中之影如鏡中之像如水上之泡脫體是空前文云種種顛倒猶如迷人四方易處此是案定四生六道一切衆生定不是了譬如世人捉得一人已定是賊次當出其罪犯今此經亦然上文既案定其罪而未明過咎行相今云不合妄執地水火風百骸九竅不實之法作自己清淨無漏法身又不合妄執色聲香味觸法虗幻不實顛倒之境并中間所起分別攀緣不實妄心作自己廣大清淨無漏真心只此便是四生六道一切衆生所迷行相殊不知殼漏子因過去於本覺上一念不覺迷真逐妄接入父母胞胎是時便就天地中假借地水火風和合在此譬如世人闕債相似莫教一旦被主人索債之時一化而為臭腐再化而為塵垢雖一指一爪一毛一髮欲存不得是時方知平生念念保惜四大皆是錯用其心嘆作見礦不識金入爐方知錯雖悔之何益於事所以吾佛聖人慈悲之故於此章經首痛警末代一切衆生然佛金口宣說真說實語如語不誑語不異語可不信乎所以裴相云嗚呼後之學者當取信於佛無取信於人當取信於本法無取信於末習也譬彼病目見空中華及第二月善男子空實無華病者妄執此乃就喻釋也虗空喻真身空華喻四大妄身第一月喻真心第二月喻緣影妄心此喻如世間之人心疑生暗鬼眼病見空華不知空本無華但是眼中病翳而妄見有華古人云一翳在眼千華亂空天唯一月本無第二但因捏目而見有之喻如一切衆生於廣大清淨真身中本無四大妄身又真心中本無妄心但是因起分別執心而妄見有所以道真法本有衆生迷而為無妄法本空衆生執而為實若全其經者更加一句云天唯一月揑者妄見也由妄執故非唯惑此虗空自性亦復迷彼實華生處此乃展轉倒見也由者因也故字出所以謂妄執見空中有華所以之故蓋眼無二用只見空中有華却失了廣大虗空之性非唯惑此虗空之性亦復迷彼實華生處者非者不也唯者獨也不獨是迷惑虗空廣大之性又却迷彼實華生處要知實華生處者只在眼翳上而生此就喻說若法說之時因妄執四大幻身所以之故便失了廣大靈明真空之性不獨是失了自己真空之性又且不知四大幻身來處要知四大幻身來處者只在一念不覺無明妄心之上也然此一段經文之意法喻未全今分開此段經文為二初本喻後補喻本喻中又二一空華喻顯二四大法合一空華喻顯者良由妄執空華所以之故不獨是失了廣大虗空之性又且不知實華生處未審實華自何而生只在眼翳上生何以知之豈不見道眼病見真華二四大法合者良由妄執四大幻身所以之故不獨是失了自己無漏無為清淨法身又且不知四大幻身來處未審四大為身自何而來只在一念不覺執心上起後補喻中又二一第二月喻顯二緣影法合一第二月喻顯者良由妄執第二月所以之故不獨是失第一月又且不知第二月生處未審第二月自何而生只在揑目上生何以知之豈不見道天唯一月揑者妄見二緣影法合者良由妄執六塵緣影所以之故不獨是失了自己常住真心又且不知六塵緣影來處未審六塵緣影自何而來只在一念不覺執心上起如此方見經文法喻俱全也由此妄有輪轉生死故名無明此乃出其過患以結之也輪以摧碾為義良由因此妄執之故所以落在三界輪回生死海中頭出頭沒變形易質改頭換面為人為鬼為畜為獸其間或眉橫或鼻直或摶冀或戴角或分牙或布爪或仰頑或伏走人間八苦天上五衰如汲井輪互為高下種種摧碾百雜千碎至今主人公不知落處古云或受焰口針喉之體經劫而飢火焚燒或作披毛戴角之身觸目而網羅縈絆或墮無間獄抱劇苦而常處火輪或生修羅中起鬪諍而垣雨刀劒或暫居人界剎那而八苦交煎或偶處天宮倐忽而五衰陷墮長沈三障不出四魔故名無明乃結歸妄原也善男子此無明者非實有體此乃顯性本空先標定也此因前云永斷無明方成佛道恐謂真箇有無明可斷不知無明本空以此遂告云只這無明脫體是虗妄無明既無實體皆是本來圓覺妙心故楞嚴云汝身汝心外及山河虗空大地咸是精真妙明中所現物如夢中人夢時非無及至於醒了無所得如衆空華滅於虗空不可說言有定滅處何以故無生處故此喻釋也由前種種過患皆歸無明今又云無體道理難見言語路絶故約喻以釋教家以四法判夢一曰無明熏習二曰舊識巡遊三曰四大偏增四曰善惡先兆又如列子曰神遇為夢形接為事只如夜間陰氣盛則夢涉水陽氣盛則夢涉火陰陽氣俱壯則夢生殺虗疾夢頑空實疾夢溺火飽則夢與飢則夢取種種恐懼怕怖如此之時恰似真有說無不得及至覺時一切皆無故龍牙云在夢那知夢是虗覺來方覺夢中無迷時恰似夢中事悟後還同睡起夫又永嘉云夢裏明明有六趣覺後空空無大千然一切衆生但是迷時見有四大幻身六塵緣影悟後即無四大幻身六塵緣影雖然如是正當迷時向他說無亦不得也問前說無明既無實體如夢中事醒時了不可得未審從何滅去故次答云如衆空華滅於空時不可說言有定滅處又問若無滅處即當還在以何因由所以之故却言一時空無故次答云此華當初本無生處故也一切衆生於無生中妄見生滅是故說名輪轉生死此斷疑也前就橫見故說是有此就實論故說本無不合於無生死真性之上妄計橫見有生有死是故指前文說名生死所以壽禪師云向不遷境上虗受輪回於無縛法中自生繫縛上文皆是頓信本無生死頓信本無無明且文殊一章經文之意大分不出於四段其四段者一標示真宗二推窮妄宰三釋成因地四結牒問詞且標示真宗者以頓宗之法先且就圓覺體上上至四聖下及六凡具有此之覺性此之覺性上無菩提可求下無衆生可度中無萬行可修心佛與衆生是三無差別然後方說迷真逐妄遂推窮妄宰之源返妄歸真悟此圓覺之性其次釋成因地者方答文殊請問世尊昔日創初起一念如何修清淨心地法門之文答意既周故乃結牒所問之詞也善男子如來因地修圓覺者知是空華即無輪轉亦無身心受彼生死非作故無本性無故顯示此即依真悟妄頓出生死也修圓覺者牒前所標即依真也知是空華者此悟妄也即無輪轉者此無生死之法也亦無身心受彼生死者此無生死之人也此上皆頓出生死前文殊請問如來本起因地法門如何修證此下方牒答云十方諸佛創初根本發起一念因修心地圓覺者莫不皆如上文宣說依真悟妄頓出生死謂語知五蘊十二處十八界一切諸法皆如空華陽𦦨夢幻泡影非真實有便免得生死輪轉何也還丹一粒點鐵成金至理一言轉凡成聖到此境界非唯無生死之法抑亦無生死之人所以疏云外遺世界內脫身心不計身故身同虗空不計心故心同法界也非作故無本性無故者世尊到此所謂一等為人須為徹又恐一切衆生疑情以謂十方如來於無量劫中入觀修六度萬行方得無生死且凡夫不曾入觀修行如何使說得無生死故告之曰不是諸佛入觀造作而後方得無生死自是本性之上從本已來無缺無餘無修無證無生無死所以道莫將間學解埋沒祖師心懶㦫云妙性及靈臺何曾受熏鍊圭峯昔在遂州任灌家讀到此處忽然大悟何以知之大鈔云讀到一二紙忽然大悟其一二紙正當此之彼知覺者猶如虗空知虗空者即空華相亦不可說無知覺性有無俱遣是則名為淨覺隨順此因上文知是空華一句又恐修行之者錯會坐在有知有覺之中遂於此虗展轉拂去其能執蹤迹文有四重一拂覺妄之智二又泯其能拂之心三遮斷滅之見四總結離過依此四重拂迹離過用心方是真正創初根本因地如文云彼知覺者猶如虗空此第一重也知虗空者即空華相此第二重亦不可說無知覺性此第三重有無俱遣此第四重意謂彼知是空華之人雖然悟知得地水火風四大虗幻之法皆當體即空如大虗空中都無有物雖然覺知妄法皆無只這能知如虗空之心亦不是真實便與前不覺空華一般由前不覺之心是於覺性上添得一箇濃色空華此覺知之智又是於覺性上添得一箇淡色空華濃淡雖異而空華即同謂之太山雖去微塵猶存又謂之前念是凡後念是聖前念是病後念是藥病已雖除藥豈存之樂天云未悟病時須去病已知空後莫依空如僧問趙州沈沈絶照時如何州云墮坑落塹了也晦堂云妄病若忘真藥盡洞然明白舊時人古云藥是病病是藥到頭兩事俱拈却到此又不可說是我分上一時無虗虗真知真性若作此解何異外道斷見然則於十二時中畢竟如何用心但將前不覺妄執四大之心并次知覺執無之心一時拂去情盡見除面前依然露堂堂活鱍鱍回避不及底道理便是本來面目圓覺之性可以隨順勿背逆可以保護勿遺失可以承當勿蹉過如是則與心運行扣寂謀虗合掌低頭聚沙畫地莫不皆以成佛道如斯修習豈非正因所以修山主云是柱不見柱非柱不見柱是非已去了是非裏薦取何以故虗空性故常不動故如來藏中無起滅故無知見故如法界性究竟圓滿遍十方故此徵起拂迹之所以釋歸圓寂也謂以何義故前妄認四大此念是幻則可言拂去今彼知覺者此念是智與覺性相應何故亦拂去耶遂出所以云虗空性故常不動故虗空說不動約寂說大凡佛書故字在句末者乃是出所以今有二故字是也譬如虗空之中山河大地草木叢林種種之物有盛有衰有興有廢有生有死而此虗空之性寂然不動本無生滅本無去來心於一心本無變易本無動靜非已去非未來非現起所以道諸法從本來寂滅無所動楞嚴云佛告阿難汝觀世間可作之法皆從變滅然終不聞爛壞虗空此上二句乃諸法不動之義下文並是顯上亦復如是如來藏者在纏謂之如來藏出纏號大法身及在有情數中曰如來藏在無情數中曰法界性其理則一藏有隱覆義含攝義謂一切衆生皆有此如來之性被貪嗔癡無明煩惱之所隱覆不能發現雖然如此而此藏中常含攝一切河沙功德又如來藏是總下無起滅故無知見故是別此是空如來藏如法界性究竟圓滿遍十方故此亦是別此是不空如來藏然脫離一切煩惱謂之空如來藏具過河沙不思議佛法謂之不空如來藏且空如來藏即是離過不空如來藏即是具德又如來藏即是因中之果何謂因中之果謂因地中便能含攝果地中一切德以如來是果藏是衆生煩惱所覆曰藏為此藏中有如來故名如來藏此六釋之中當有財釋何謂之有財釋恐相濫大凡作釋有濫方作釋無則不必作此有財釋者恐謂藏便是如來而藏不是如來為藏中有如來故曰如來藏如匱不是金緣匱中有金故曰金匱無起滅者此釋前妄認四大為自身相等文此是起能執迷心見有生有死無知見者此釋前彼知覺者猶如虗空等文此是能起覺悟之智達無生死謂見生死起時即云執情達生死滅時即云知覺今如來藏中迷時生死不曾起此乃無迷悟時生死不曾滅此乃無悟無迷故無起滅無悟故無知見所謂實際理地不受一塵更無一法可當情如法界性者此下乃不空如來藏法界性與如來藏其體則同其義則別別有二意在有情數中名如來藏在無情數中名法界性究則初也竟則終也從初到終竪窮三際始終常然圓則周遍虗空滿則衆德具足意謂此不空如來藏竪窮三際橫遍十方從本已來自性滿足一切功德所謂自體有智慧光明義遍照法界義真實識知義自性清淨義常樂我淨義清涼不變義具足如是過於恆河不離不斷不思議佛法無有闕少更不須減舊添新滅惑生智所以古德云汝等諸人但先覓一箇悟門若悟之後所有世間工巧伎藝書數算計文章道德種種奇特之事一時具足但令心得應真神通相好不求自至更不須苦志勞形役心去學便與黃面老子若合符節以是離過具德合於本覺將此為本修行始得名為正因是則名為因地法行菩薩因此於大乘中發清淨心末世衆生依此修行不墮邪見此結牒問詞蓋初文殊請問了悟覺性及發菩提心并為末代衆生世尊到此結答云如我上來所說此無明者非實有體知是空華即無輪轉乃至有無俱遣如來藏無迷無悟只此便是因地只此便是發心只此便是末代衆生修行之要路除此之外餘皆落邪見爾時世尊欲重宣此義而說偈曰文殊汝當知一切諸如來從於本因地皆以智慧覺了達於無明知彼如空華即能免流轉又如夢中人醒時不可得覺者如虗空平等不動轉覺遍十方界即得成佛道衆幻滅無處成道亦無得本性圓滿故菩薩於此中能發菩提心末世諸衆生修此免邪見大凡偈有四種一曰數即西域以三十二字為一偈如云華嚴十萬偈等二曰諷頌即孤起不與長行相應者三曰應頌與長行相應故四曰集施以少言攝多義故今即第三梵云祇夜此云應頌頌長行故或為鈍根重說或為後來之徒或為增明前說今先以長行及偈諷相望有五對謂長有偈無長廣偈略長離偈合長先偈後長隱偈顯亦可反是言之只如此偈中云能發菩提心一句此是長隱偈顯長行只云發清淨心是也其他以偈詞照長行則文義可見後偈中皆例此矣解行倫貫先舉類以顯大疏云此經人法儀式懸符華嚴且說人儀式同者華嚴經首先是文殊起請次是普賢其次諸菩薩今此經亦然首先亦是文殊請問次普賢又次普眼諸菩薩此謂之人儀式與華嚴同法儀式與華嚴同者且華嚴八十卷經不出是信解行證第一菩提場說經六品十一卷舉如來依正之果勸一切衆生欣樂生信此屬信經第二普光明殿說經六品四卷第三忉利天宮說經六品三卷第四夜摩天宮說經四品三卷第五兜率天宮說經三品十二卷第六他化自在天宮說經一品六卷第七重會普光明殿說經十一品十三卷共四十一卷經乃修因契果令人生解此屬解經第八三會普光明殿說經一品七卷乃托法進修令人成行此屬行經第九逝多林說經一品二十一卷乃依人證入法界成佛之德此屬證經今此經亦然第一文殊章經文通為上中下三根開發信解第二普賢一章經文通為上中下三根開行然後次第分三根證入且上根人二空觀法界證入中根之人三觀諸輪證入下根之人道場加行證入此之儀式與華嚴同約教相配二菩薩者先問云如華嚴九會之中文殊則出會請問普賢只在會中更不動何也謂普賢表理文殊表智由智有回轉之義能和會頓教終教始教愚教歸於一乘別教也今文殊一章是頓解悟普賢一章二空觀是頓證悟三觀諸輪是漸證悟且如先悟後修者如日出孩生先修後悟者如服藥病痊先悟後修者譬如欲往他方必先遙見所在然後褁糧而行先修後悟者如先行然後忽到竊見今人多有將解悟非證悟只是解到諸佛解處行全未有一旦忽遇逆順境界無明煩惱則生滅之心依前尚在與凡夫何異要敵生死不得要須依解起行方得證入此經正對治此等禪病也於是普賢菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言大悲世尊願為此會諸菩薩衆及為末世一切衆生修大乘者聞此圓覺清淨境界云何修行此徵修行也言普賢者此有三釋一約自體謂體性周遍曰普隨緣成德曰賢二約諸經曲齊不遺曰普鄰極亞聖曰賢三約當經德無不周曰普調柔善順曰賢然學道之人闕文殊普賢不得須得智慧眼睛於一切處一切時覷破一切障礙境界故云毗盧遮那如來以金剛王寶劒授與文殊文殊常用此劒揮斫此是文殊大智也其次要得堅固道力克荷如來付屬之重擔使後五百歲中佛種不斷又云普賢行願遍滿虗空此是大行普賢今此門中依圓覺妙心徵幻法而明正行故當此菩薩請問大乘者大以簡小乘以運載大乘以本始二覺為體願者希求樂欲聞此圓覺清淨境界者指在文殊章中聞佛宣說廣大靈明圓覺境界也修行者譬如道路久被指壞當修慗令平坦使一切人長行此道今此亦然無量劫來熏習無明生滅種子分彼分此憎愛我慢種種損壞今當除去令此心地坦平然後十二時中常行此道問未審此平坦心道其行相如何答華嚴經云佛子於一切時當慈念衆生故饒益衆生故安樂衆生故憐愍衆生故攝受衆生故不捨衆生故成就衆生故調伏衆生故教化衆生故覺悟衆生故清淨衆生故世尊若彼衆生知如幻者身心亦幻云何以幻還修於幻此問幻幻何修也若彼衆生指前當根之人知如幻者身心亦幻此領文殊章知是空華之解云何以幻還修於幻此問起行以幻者即幻智於幻者即妄幻意謂於文殊章中聞佛宣說知是空華即無輪轉既知妄身及妄心皆如幻師作幻術故以巾結為兔馬並皆不實只此能知之智亦是不實我今云何以智幻却道其妄幻普賢意謂若以真遣妄則合其理何故以妄遣妄耶然理則頓悟乘悟併消事非頓除因次第盡普賢設此一問特為後代撥無因果不肯修行之人除執故也若諸幻性一切盡滅則無有心誰為修行云何復說修行如幻二問斷滅修也諸幻即上文說妄幻與智幻若以前妄執身相妄幻之心與彼智覺之智幻心都拂盡之時我則無有起修行之智心如此之時都成斷滅外道見解遣誰修行若此所見何得成佛若要成佛須假起智之心修行既要起智修行世尊又却如何重說起智之心亦是妄耶若諸衆生本不修行於生死中常居幻化曾不了知如幻境界令妄想心云何解脫三遮不修之失也此恐惑者云一切如幻無不是覺覺性無生本來清淨但知便了安用修行故此遮云若謂一切衆生本性之上本來清淨圓滿無修無證之時爭奈一切衆生見今輪回生死大苦海中受種種形耽著五蘊十二處十八界幻化不實顛倒境界謂此是我此是彼乃至田園屋宅盡將作真實之事曾無一人了達覺悟知是虗妄不實之境譬如幻師結成兔馬等由幻化者無而忽有謂之幻有而忽無謂之化只是幻師以術之故將手巾作兔馬此是無而忽有才到解術之後兔馬依前只是手巾此是有而忽無此約喻說之若法說之時一切衆生未入父母胞胎亦無此身既一念不覺入胎之後便有百骸四大五蘊九竅此如將手巾結成兔馬也才到一口氣不來一化而為臭腐再化而為塵垢雖一指一爪一毛一髮欲存之而不可得此是幻師解術兔馬還空也既然不覺不悟耽著虗妄顛倒之境認為實有於一切處一切時前念續後念後念續前念盡是塵勞妄想情狀萬點顛倒分別計度之心如此之時如何得悟理見性棄背生死解脫於涅槃所以圭峰云從來不達事妄想不解脫今還不了知如何得解脫願為末世一切衆生作何方便漸次修習令諸衆生永離諸幻作是語已五體投地如是三請終而復始爾時世尊告普賢菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生修習菩薩如幻三昧方便漸次令諸衆生得離諸幻汝今諦聽當為汝說時普賢菩薩奉教歡喜及諸大衆默然而聽誠請許聽也言如幻三昧者如幻不實前喻中釋三昧此云正受疏云不受諸受故曰正受受以領納為義如明鏡當臺而鏡中本無青黃赤白長短大小闊狹之相此雖不受而不礙青黃長短大小闊狹之相發輝菩薩修如幻三昧亦然於平等覺性之上上無菩提可求下無衆生可度中無萬行可修雖可求可度可修亦不礙饒益有情利樂群品度脫衆生廣修萬行只要如夢如幻相似且如見有一蟻落水之時不見有能救之人所救之物此謂之修如幻三昧也又如學道之人於十二時中行時不得作行會住時不得作住會乃至坐臥看經禮拜慈悲方便並不得作一絲毫情見執有然後不妨行住坐臥等所以道修習空華萬行宴坐水月道場降伏鏡裏魔軍成就夢中佛事善男子一切衆生種種幻化皆生如來圓覺妙心答文有四今一標幻從覺生以為義本也言衆生大凡也種種幻化即五蘊十二處十八界皆是有漏之法如來即佛也圓者離相不偏覺者空而不空妙者染而不染心者梵云乾栗馱此云堅實心不同緣慮集起之心此心之一字今約五教明之愚教假說一心謂小乘人不知心外無法執心外有境故若始教以第八阿賴識為一心謂心外無境故若終教以如來藏為一心理事無二故若頓教以泯絶染淨但是一心破諸數故若圓教以總該萬有即是一心謂理事本末無別異故今此心乃是泯絶染淨但是一心之心也謂此頓宗呵教勸離毀相泯心生心即妄不生即佛更不依倚地位漸次意謂一切衆生五蘊十二處十八界內之一身外之萬物一切有漏之法並從十方諸佛廣大虗明妙心之上生起此是妄從真起此中便是起信三細六粗也問之圓覺妙心凡聖平等今經何故不云衆生妙心耶答諸佛已證故衆生性具故所以獨標佛也猶如空華從空而有幻華雖滅空性不壞此下二明幻盡覺滿以釋前疑三中一舉喻釋也前說種種幻化皆生如來圓覺妙心似人緣眼病之故所以妄見空中有華故曰一翳在眼千華亂空一妄在心河沙生滅眼翳若除空華即滅而此廣大虗空之性本無損壞所謂翳瘥華亡衆生即佛故起信論云一切境界唯依妄念而有差別若離妄別則無一切境界之相華嚴云了達三界依心有十二因緣亦復然生死皆由心所造心若滅時生死盡衆生幻心還依幻滅諸幻盡滅覺心不動二法合本義幻心即妄幻也幻滅即智幻也謂衆生既起妄執四大六塵緣影之幻心如何除去須是依倚彼知覺者幻智之心而滅去也此謂之明來暗謝智起惑亡如稱兩頭低昂不昂雖然滅前妄幻之心尚存能覺幻智之心未忘更須妄幻與智幻都拂却到諸幻盡處方始見本來圓覺妙心無去無來寂然不動其猶波因水起波滅水存幻從覺生幻滅覺滿方是行到水窮處坐著雲起時到這般田地方許移身轉步十字縱橫萬化千變而無窮楔此一段文蓋普賢前問幻幻何修今答云不妨以幻修幻正如以楔出楔因聲止聲也依幻說覺亦名為幻若說有覺猶未離幻說無覺者亦復如是是故幻滅名為不動三兼拂問幻之覺拂有三重第一若謂對妄幻說有覺悟之心者此是對待之法只此能覺之心亦是幻也第二若謂前來之覺乃是對幻之覺今不對幻覺自別有一真覺者若起此心又未離幻與前依幻說覺一般前是犯著粗病此是犯者細病第三若更謂前說自別有一覺乃是著有今和此有覺一切智無只這說無底心亦是幻也何故若謂自己分上有此一段殊勝奇特之事充塞六虗遍滿法界此是於圓覺性上分外著一箇有遂成兩箇若謂只這奇特殊勝之事都無又是於圓覺性上分外著一箇無亦是兩箇所以道捨一取一終無了日將以唯心轉見病深又云棄有著空病亦然還如避溺而投火雲門道光不透脫有兩般病一切不明面前有物是一也透得一切法空隱隱地似有箇物亦是光不透脫是二也是與麼也不得不與麼也不得然則畢竟如何用心但將前對幻說覺之心與不對說覺之心及說無覺之心諸幻一時拂去之後方是不染二邊清淨無去無來不生不滅之覺性也故金剛云如如不動又云有無俱去處恃地好乾坤善男子一切菩薩及末世衆生應當遠離一切幻化虗妄境界由堅執持遠離心故心如幻者亦復遠離遠離為幻亦復遠離離遠離幻亦復遠離此下三展轉離幻顯覺其文有四重一離妄二離覺三遣離四遣遣前二是我執後二是法執文從善男子至虗妄境界此第一重離妄也謂世尊召普賢及一切衆生修行之者合當如我所說勸誡於十二時中遠離五蘊十二處十八界幻化虗妄不實之境界所謂出乎陰陽造化形器度數之外用心是也由堅執持至亦復遠離此是第二重離覺也雖然妄法皆捨猶尚堅執能覺之心確然不捨只此能覺之心又是虗幻不真實心亦當離却遠離為幻亦復遠離此是第三重遣離也雖然離得能覺之心尚有能離之心未忘此猶是細病只此能離之心亦當再遣也離遠離幻亦復遠離者此是第四重遣遣也然雖遣得能離之心尚有微細能遣之心未忘只此能遣之心亦當更遣遣之又遣以至於無遣譬如遇著冤家但莫與他共住即得無患大凡學道之人於十二時中常以觀慧念念不斷如雞抱卵須是暖氣相接得又須知有細病若坐在情執中棄捨不得之時喚作礙膺之物所以藥山告李翱曰大守欲得保任此事直須向高高峯頂立深深海底行閏閣中物捨不得俱為滲漏所以道學道先須細識心細中之細最維尋可中尋到無尋故方信凡心是佛心得無所離即除諸幻後密顯真覺也言密顯則經中無覺字故上則四重虗幻之法一時遣盡之後又却依前面前活鱍鱍地動地放光在在處處回避不得此方是本來真覺之性全體獨露無一絲毫是外物到此境界諸天捧華無路外道潛覷不見圭峯云靈靈自覺元無物援援他緣盡是空白樂天云前後際斷一念不生時才更生心動念即乖法體失正念故譬如鑽火兩木相因火出木盡灰飛烟滅喻顯也木喻妄火喻覺灰喻離烟喻遣合是烟滅然後灰飛此譯人之倒謂前文四重離妄離覺遣離遣遣之意喻如大地生木丙木相因勢性才發則火出燒却木橛既然燒了雖然有灰也被風吹去烟亦滅了而大地不曾動著却將大地喻圓覺性金無起滅龍牙云學道如鑽火逢烟且莫休直得星星現歸家始到頭般子云夜靜水寒魚不食滿船空載月明歸以幻修幻亦復如是諸幻雖盡不入斷滅此合喻也以幻即前文殊章第二番智幻修幻即前文殊第一番妄幻意謂用智幻修習妄幻之時亦如世人鑽火相因兩木火出木燒灰飛烟滅雖然用智幻遣得妄幻尚有智幻存更將智幻一時遣盡然後遣不去處方不虗豁不同斷滅外道空無之見古云妄起即覺妄滅覺滅覺妄俱滅即是真如問一切盡滅則無心佛答諸幻雖盡不入斷滅善男子知幻即離不作方便離幻即覺亦無漸次一切菩薩及末世衆生依此修行如是乃能永離諸幻四辨幻覺不俱結酬其請也此普賢前問作何方便次修習令諸衆生永離諸幻今答云但照見五蘊十二處十八界一切有漏之法是幻妄非實即是離幻更不必作方便譬如世人夢見身瘡百計千般求藥療治才睡覺之後此瘡本無更求何藥學道之人但離得幻法即幻便是真覺更無地位漸次階級所以云一念頓悟便是觀音彈指回心立為妙德但得雪消去自然春到來更勸囑云一切菩薩及末世頓機衆生但依我教法修行便可永超夢幻出離輪回直趣無上佛果菩提也爾時世尊欲重宣此義而說偈言普賢汝當知一切諸衆生無始幻無明皆從諸如來圓覺心建立猶如虗空華依空而有相空華若復滅虗空本不動幻從諸覺生幻滅覺圓滿覺心不動故若彼諸菩薩及末世衆生常應遠離幻諸幻悉皆離如木中生火木盡火還滅覺即無漸次方便亦如是普賢章畢
