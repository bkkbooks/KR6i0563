body:
  text: 一者作病若復有人作如是言我於本心作種種行欲求圓覺彼圓覺性非作得故説名為病疏云謂或思惟揣度計校籌量興心運為擬作行相造塔起寺供佛供僧持呪持經僧講端然宴坐種種施為止息深山俗講遊歷世界勤憂衣食謂是道緣故受飢寒將為功德觀空觀有愛身厭身於多行門隨執其一託此一行欲契覺心既是造作生情豈合無為寂照之理此病從前幻觀中來彼云一切菩薩從此起行至諸輪中皆云度生起行今失彼文意成此作病也二者任病若復有人作如是言我等今者不斷生死不求涅槃涅槃生死無起滅念任彼一切隨諸法性欲求圓覺彼圓覺性非任有故説名為病疏云前則驅馳覓佛此乃放縱身心也意謂生死是空更何所斷涅槃本寂何假修求不厭不欣無作止念但於一切法上任真自然如天高地厚火熱水濕風搖土靜松直棘曲鵠白烏玄各各差別之類此是其性自然今時有一般人云妄從他妄真任他真各稱其心何必改作作亦任作好間任間逢飢即餐遇衣即著好事惡事一切不知任運而行信緣而活睡來即臥興來即行東西南北何定去住謂言間即契道殊不知是病所以騰騰和尚云不用廣學多聞不要辨才聽俊不知月之大小不管歲之餘閏人來問我若為不能共伊談論寅朝用粥充飢齊時更餐一頓今日任運騰騰明日騰騰任運此病因前辨音章文云圓覺清淨本無修習及修者失彼文意自謂已覺何必作幻故成任病也三者止病若復有人作如是言我今自心永息諸念得一切性寂然平等欲求圓覺彼圓覺性非止合故説名為病疏云前則生心恐非次則隨情慮失今但止息其妄妄盡則自然平等即真何須別照由息念故離相離相故得性此性是諸法無性性非即覺性也此病從前靜觀中來迷彼取靜為行及澄諸念之言因成此止病也四者滅病若復有人作如是言我今永斷一切煩惱身心畢竟空無所有何況根塵虗妄境界一切永寂欲求圓覺彼圓覺性非寂相故説名為病疏云前但止息心念令寂此則計於身心根塵本來空寂又則前不妨見有根塵但不隨念愛染故云止息此則根塵亦無堅持空寂之相由見空無故云除滅意云煩惱之本即是身心若執身心煩惱何斷故標斷煩惱釋以身空又斷煩惱空却身心身心尚空根塵何有身等本空故名永寂諸相既泯寂相現前擬將此心求證圓覺夫覺體靈明不唯寂滅今滅惑住寂豈得相應況圓覺體非動非靜雙融動靜恆沙妙用無礙難思住寂之心何能契合言即似近理即全乖與理相違故成滅病此病從前寂觀中來彼諸輪中皆云寂滅及斷煩惱迷彼成此此之四病皆緣不以聖教為繩墨不以師友為指南但自舉心作如是意所以經首皆云若復有人作如是言也離四病者則知清淨作是觀者名為正觀若他觀者名為邪觀此總結前四病真偽也離四病者則知清淨者疏云但將前四行自驗其心隨落一門則知是病故言離者則知清淨然其四門皆是諸經勸讚況前三觀具有斯文今此以為病者有其二意一者四門中皆無觀慧二者但以率心偏住一行不窮善友圓意不究佛教圓文才悟一門之義便不能久事明師才見一經妙文便不能廣窮聖意但貪單省執一為圓是以經文總呵為病也作是觀者離四病也故名正觀若他觀者取四病也故名邪觀外典有曰適堯舜之道者正道也非堯舜之道他與此同意然此四門但除其病不除其法若未見道之時此四皆成執病若見道之後此四皆可入道自然終日作而未嘗作終日止而未嘗止終日滅而未嘗滅禪宗喚作不改舊時人只改舊時行履處只如昔釋迦在於僧中演無上道與僧不異維摩在俗説解脫果與俗無殊勝鬘女説大乘法與女人形不改善星比丘行闡提行僧相不移又如世間仕官之人為遷職改官官高豈即貌別服此諸説但去內之執心何關色身男女相貌衣服好醜等事耶若言形隨證改貌逐悟遷是聖人者則瞿曇改形方成釋迦維摩遷相乃成金粟若不達此理縱是腳蹈蓮華亦同魔作問此之四病為説揀師師離四病耶為説學人自離四病耶若説師病者何以問中別舉并又結云作是觀者名為正觀若説學人病者云何標中云彼善知識所證妙法應離四病答二皆不異既聞經識病須求離病之師既事此師即修離病之行若師若徒病無別相也善男子末世衆生欲修行者應當盡命供養善友事善知識彼善知識欲來親近應斷憍慢若復遠離應斷瞋恨現逆順境猶如虗空了知身心畢竟平等與諸衆生同體無異如是修行方入圓覺此辦事師心答前問行何等行何以知之後結云如是修行方入圓覺然法句經説善知識有二十十種譬喻一知父母二眼目三腳足四梯橙五飲食六寶衣七橋梁八財寶九日月十身命等乃結云善知識者有如是無量功德是故教汝親近大衆聞已舉聲號哭自念曠劫已來常為善知識之所陶鑄守護保庇攝受種種恩德言欲來親近者此現順也若復遠離者此現逆也夫善友種種方便俯就物機相親相近愚者無識憍慠怠慢之心便生或遇異緣相去相離便生嗔恨云疏我親彼説愛説憎既一念才瞋百萬障起非唯失道亦墮三塗也勝鬘經云應攝受者而攝受之應折伏者而折伏之則佛法久住也意謂末世衆生希求樂欲修圓覺妙行者合當盡其身命恭敬供養承事善友知識若彼善友知識或來親近或有遠離此乃是現逆順之境相試不得起憍慢乃嗔恨之心況諸佛用心或慈或威或定或慧救拔衆生得大自在此時用心猶如虗空湛然常住廓爾無私更無改變當以觀智了達彼善知識身心之中具廣大靈明佛性此之性上有如此堅通有如此橫遍有如此真常有如此絶迹有如此不變有如此隨緣有如此普天匝地有如此逼塞虗空非唯善友身心之中如是且自己與一切衆生身心中亦有如此竪通如此橫遍如此真常如此絶迹如此不變如此隨緣如此普天匝地如此填溝塞壑自己不二彼我無差同體平等更無有別此謂之發同體大悲心故華嚴云若有欲知佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙脫或不然則雖知菩提之道世間所尊可進可求而不能折伏我慢不能屈節事師雖知薩埵衆生可悲而不能忘軀弘道故所以世尊於此痛言教示之若能依此教示修此所説之行方許證入圓覺反明若不如是修行則不能入圓覺也善男子末世衆生不得成道由有無始自他憎愛一切種子故未解脫此明除病之行也自他憎愛者前已頻明今復説者是種子故即入道之微細病也謂捨此取彼憎妄愛真蓋現行粗而易覺種子細而難明故偏指之夫四之與三而衆擔妄生喜怒非之與是而世人競起愛憎悲夫若復有人觀彼怨家如己父母心無有二即除諸病此等自己之心觀一切之人若將上怨同上親觀之者即得無上法樂也於諸法中自他憎愛亦復如是此等自己之心觀涅槃之法前既云怨家父母無二例此觀法應云涅槃生死不殊不殊則無自他憎愛故知諸病只由愛真憎妄見自見他故不肯久事宗師但自生情起行今既斷種子則諸病自除所以前云即除諸病此文亦復如是由與能觀人除病之意一同也善男子末世衆生欲求圓覺應當發心作如是言此下經文答顯發心深廣答前問云何發心也謂十方諸佛本起因地皆發此四心依願修行方成正覺若無願力䇿發則所修之行亦不成就四心者一廣大心二第一心三常心四不顛倒心彌勒頌云廣大第一常其心不顛倒此之四心與金剛經發四心同也故下依頌節釋也盡於虗空一切衆生此發廣大心也金剛云所有一切衆生之類若卵生若胎生若濕生若化生至若非無想此是三界四生九類今經云盡於虗空一切衆生與彼同也我皆令入究竟圓覺此發第一心也金剛云我皆令入無餘涅槃而滅度之謂三界四生九類菩薩之人不擇怨親發第一心皆以真如寂滅之理而普便修行同證入十方諸佛不生不滅涅槃之理若不如此即與二乘無異今此經云我皆令入究竟圓覺者各隨其經宗旨以舉法也於圓覺中無取覺者此發常心也金剛云如是滅度無量無數無邊衆生實無衆生得滅度者謂此真如寂滅之理普度三界四生九類了不見有能度之人亦不見有所度衆生能所俱忘若見有能度所度即不平等既不平等豈能常常運如是心耶常之一字即平等之義今經云於圓覺中無取覺者疏云我入覺時我即圓覺衆生亦爾意謂我證圓覺即以此圓覺度脫一切衆生皆入圓覺衆生既圓覺我即不見一切衆生因我度之而入圓覺若見有衆生因我度之而入圓覺者乃是取著相即非平等之心也除彼我人一切諸相如是發心不墮邪見此發不顛倒心也金剛云何以故須菩提菩薩有我相人相衆生相壽者相即非菩薩謂設或見有能度之人所度之者又有何因由所以之故便妨於道耶由若見有能度與所度者須菩提此菩薩之人即著我人衆生壽者四相即不是菩薩用心乃是凡夫用顛倒之心反明不見有能度與所度者須菩提此菩薩之人方無我人衆生壽者四相此乃是菩薩用不顛倒心今經云除彼我人一切諸相者謂若不見有衆生因我入圓覺者方除我人衆生壽者四相并一切能所之相若離四相即是菩薩不顛倒心前發五問今垂五答一問求何等人答云當求一切正知見善知識二問依何等法答云當依倚圓覺妙法三問行何等行答云應當盡命供養善友辨事師之心不見逆順境界不得憍慢及起嗔恨如是修行四問除去何病答云當除去自他憎愛一切種子五問云何發心答云當如前發廣大心第一心常心不顛倒心其次序來歷對文一一可見爾時世尊欲重宣此義而説偈言普覺汝當知末世諸衆生欲求善知識應當求正見心遠二乘者法中除四病謂作止任滅親近無憍慢遠離無瞋恨見種種境界心當生希有還如佛出世不犯非律儀戒根永清淨度一切衆生究竟入圓覺無彼我人相常依止智慧便得超邪見證覺般涅槃戒根永清淨者此頌前能治也以所治憎愛見犯戒因故云未得解脫證覺般涅槃者梵語此云入證覺者即唐言也涅槃者即梵語此云滅度即唐梵并舉也通前綸貫於此一部經文大意血脈者蓋第一文殊一章經文通上中下三根之人開解第二普賢經文通為上中下三根之人開行為文殊是能證之智普賢是所起之行遍周法界若唯有解而無行者一似沙井而無潤若有行而無解者似空有雲而無雨唯是解行相應方可進修入道譬如結網而終是取魚褁糧而必須前進故有普賢開行其次第三普眼一章經文依文殊之解及普賢之行修我法二空觀兼倣修華嚴三重法界觀既入觀門恐有疑情故有第四剛藏菩薩起三疑請問第一疑云衆生本來成佛何故復有一切無明莫是從真起妄否第二疑衆生無明本有何因緣故復説本來成佛莫是説妄為真否第三疑云十方異生本成佛道後起無明一切如來何時復生一切煩惱莫是先真後妄否故牒而縱之責無窮過既剛藏有此三疑而世尊將空華一喻通答三疑以金礦一喻別答第三疑然剛藏有此情者皆由無始輪回根本未曾斷也故疑有第五彌勒菩薩請問云何當斷輪回根本審審如何是輪回根本世尊遂告云輪回根本莫不皆由貪愛二字使令斷去貪愛貪愛既斷即便有證入既證入必有差別不同故有第六清淨慧菩薩請問一切衆生及諸菩薩如來世尊所證所得云何差別世尊遂告之以凡賢聖果四位階降當時會中有一類上根之人聞佛如是廣開方便種種法門便能如是信如是行如是證一時超夢幻出輪回直趣無上佛果菩提所謂良馬見鞭影而行其次在座更有一類中根之人雖於前六章經文中聞佛如是開解了但以根劣故不能證入二空之觀於是有威德菩薩請問於佛譬如大城外有四門隨方來者非止一路且如上根之人已證入二空及法身觀而中根之人未審更有何方便而得證入世尊遂示之以奢摩他三摩鉢提禪那靜幻寂三觀行相既知此三觀行相之後而尚未知一人具修三觀三人各修三觀為復有次第故有辨音菩薩請問云此諸方便於圓覺門云何修習世尊遂告之以單修復圓修共有二十五輪被二十五種機行人既入三觀諸輪必有所悟既有所悟便犯我相人相衆生相壽者相故有淨業菩薩一章經文持為行人除去四相四相既除方可用心修習而用心之處覺由未普復有是非若不依師指教即隨四病故有普覺一章經文為行人除去作止任滅四病四相既除四病亦遣其覺方普當時於佛會中在座有一類中根之人聞佛開示如是四章經文便能依如是信如是解如是行如是證入圓覺其次在座更有一類下根之人雖已於初六章經文中聞佛説二空等觀并其次四章經文中三觀諸輪於觀中斷障遣惑除病破疑種種法門悉皆開解但障重習深不能證入由此經若只接得上根之人接中根之人不得時不謂之圓覺若接得上根及中根之人不得不能接得下根之人亦不謂之圓覺唯是上中下三根之人一時普被是覺之圓故曰圓覺於是故有圓覺菩薩為下根之人請問佛云我等今者已得開悟若佛滅後末世衆生未得悟者云何安居修此圓覺世尊遂告之以上中下三期道場於道場中加功練行策發進修不過亦是修前靜幻寂三觀也當時在座一類下根之人聞佛宣示道場加行法門能依如是信如是解如是行如是證入所以云一法巧被三根經云譬如大海不讓小流乃至蚊虻及阿修羅飲其水者皆得充滿方謂之圓覺也然大科云初四問答通明觀行上根修證次四問答別明觀行中根修證後一問答道場加行下根修證也於是圓覺菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言此當後一問答道場加行下根修證疏云然此正宗中諸菩薩等與佛問答發揚本意欲顯圓覺但緣節節過患未盡義意未圓收機未普故表法菩薩未標圓覺之名今此有其三意得名圓覺一前雖病盡理圓仍恐下根難入此又曲開方便三期道場即上中下根普得圓覺二由前節緣行解已圓至此名為證極證極之境更無別體唯是圓覺三最初標指圓覺為陀羅尼門者此乃是從本起生也今顯法義已圓還標圓覺者此乃攝末皈本表此三意故當此菩薩請問也大悲世尊為我等輩廣説淨覺種種方便令末世衆生有大增益此指前二空觀及三觀諸輪種種方便法門也世尊我等今者已得開悟若佛滅後末世衆生未得悟者云何安居修此圓覺清淨境界此圓覺中三種淨觀以何為首惟願大悲為諸大衆及末世衆生施大饒益作是語已五體投地如是三請終而復始此有二問初問道場經云未得悟者云何安居修此圓覺次問加行經云此圓覺中三種淨觀以何為首是也爾時世尊告圓覺菩薩言善哉善哉善男子汝等乃能問於如來如是方便以大饒益施諸衆生今諦聽當為汝説時圓覺菩薩奉教歡喜及諸大衆默然而聽善男子一切衆生若佛住世若法末時有諸衆生具大乘性信佛祕密大圓覺心欲修行者若在伽藍安處徒衆有緣事故隨分思察如我已説先答道場也若法末世者即末法一萬年具大乘性者即宿有聞熏種也緣事者即利他之事也隨分思察如我已説者此指前普眼法門及三觀諸輪所説謂圓機菩薩不滯空間種種施為作諸利益廣度群品備學法門隨其間暇無事時分之中則便思察三觀故云隨分非是見解未圓為隨分也若復無有他事因緣即建道場當立期限若立長期百二十日中期百日下期八十安置淨居此即道場期限也無有他事因緣謂菩薩之人但是逢著有益於人之事即便為之遇著善緣即趣之也今無此二事故曰無有他事既無利他之事當入三期尅志加功以期聖果為自行邊事此三期者若太過則行人情生疲倦若少則行人功行未圓所謂敏則傷於太過鈍則愧乎不及故量三尅期亦無別義然約三根配之有其二意一約障盡難易者長期乃下根中期乃中根下期乃上根二約精進懈怠者即反於此蓋根有利鈍期有遠近對病設藥斯之謂歟安置淨居者此欲內外清淨身心潔白事理稱可也若佛現在當正思惟若復滅後施設形像心存目想生正憶念還同如來常住之日懸諸幡華經三七日稽首十方諸佛名字求哀懺悔遇善境界得心輕安此明道場行相然行相之中又有二意一隨相用心二離相用心今乃是隨相用心若佛現在當正思惟者只如此經十方之人皆是佛現在之時當機之者既有此機又遇在世親聞佛所説法即正念思惟一切諸法不離一心當知唯心之內則無境界若佛滅後施設形像者此明如來大師已入涅槃不覩真儀但設以形像諦觀引心入法相即無相即見如來亦可想佛真身常住不滅也此是約事説若約理説者行人若觀行無間斷名為佛現在若觀行間斷之時名為佛滅後也斷後復作觀者名為施設形像也所以大珠和尚云身口意清淨是名佛出世身口意不清淨是名佛滅度今既為下根之人設教且從初事相釋也懸諸幡華下即禮懺之儀式也三七日者此但是去其久近無別所表方等經説極少七日矣稽首者謂以頭稽留於地少時方起故曰稽首懺即梵語懺摩悔即唐言悔過謂懺則陳露先罪悔則改往修來若離垢慧菩薩所問禮佛法僧中説總有八重一供養二讚佛三禮佛四懺悔五勸請六隨喜七回向八發願今略唯有其二者即禮佛懺悔也然文雖略法中亦具也遇善境界得心輕安者此感應也或見仙像或覩光明不作聖心名善境界若作聖解即受群邪故下文云非彼所聞一切境界終不可取也若天台之意只許與信解行證相應善境界如楞嚴云又以此心成就清淨淨心初極忽見大地十方山河皆成佛國具足七寶光明遍滿又有恆沙諸佛如來遍滿空界樓殿華麗下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證不作聖心名善境界若作聖解即受群邪過三七日一向攝念此明離相用心攝念者起信云若修止者住於靜處端坐正意乃至心若馳散即當攝來住於正念正念者當知唯心無外境界也若經夏首三月安居當為清淨菩薩止住心離聲聞不假徒衆至安居日即於佛前作如是言為清淨菩薩止住者此指大乘菩薩也聲聞即小乘也徒衆即六和之衆也六和衆者一身和二口和三意和四戒和五利和六見和長蘆祖照頌云身和共住非所勿去諸上善人同會一處口和無諍非禮勿聽同氣相求同聲相應意和同知勿受便宜不善厭作心不可欺戒和同修慎勿貪求防非止惡莫結冤讎利知同均平等最親你分八兩我得半斤見和同作莫生輕薄不恃己長大家安樂今則依大乘而修不假須此徒衆也我比丘比丘尼優婆塞優婆夷某甲踞菩薩乘修寂滅行同入清淨實相住持以大圓覺為我伽藍身心安居平等性智涅槃自性無繫屬故今我敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故不繫徒衆梵語比丘此貪三義謂一怖魔二乞士三淨戒比丘尼即尼師也尼者女也優婆塞此云近事男即行者學法之人也優婆夷此云近事女即學法女也然小乘局於二衆大乘道俗俱霑也某甲則各稱其名踞者居也菩薩乘者揀羊鹿車也修寂滅行者揀四諦也實相住持者非事相住持也伽藍此云衆園園是衆所居之處故圓覺為萬德之所依此一段文據圭峯疏云意乃轉八識為四智也問何謂之八識耶答眼耳鼻舌身即前五識也第六意識第七末那識第八阿賴耶識也然前五識屬外即用也後三識屬內即體也又前五識屬後得智後三識屬根本智也何謂四智答一成所作智二妙觀察智三平等性智四大圓鏡智也今轉者謂菩薩之人才登初地方轉得第六意識成妙觀察智此智善達諸法也然此第六識中具善性不善性無記性為三性乃分別一切法也其次入二地至十地方轉得第七末那識成平等性智此智乃是翻因得名蓋因執我不平等故須翻之也然末那此云染污根謂此識內執我癡我慢我愛我見外執有凡有聖有高有下有彼有此不能平等也然上二識乃是菩薩之人因地於十地之中轉也其次於等妙二覺果位上方轉得第八阿賴耶識成大圓鏡智此智乃是從果得名然此第八識執內身外境山河大地根身器界種子也今則譬如大圓鏡光明圓滿也如第十七祖一日遇一童子手持一鑑祖問曰汝手中以何所表童子曰諸佛大圓鏡內外無瑕兩人同得見心眼皆相似此是果上轉也第八識成大圓鏡智而前五識只就果上一道轉成成所作智此智作諸佛事也所以祖師云大圓鏡智性清淨平等性智心無病妙觀察智是非功成所作智同圓鏡五八六七果因轉但用名言無實性若於轉處不留情繁興永處那伽定雖云六七因中轉五八果上圓但轉其名不轉其體也今經身安即成所作智也心安即妙觀察智也此以四惑相應妄計賴耶為自內我於平等理中起不平等見今既所緣性寂能緣七識自如如性皆同故成平等性智也次大圓覺者此大圓鏡智也豈不見乎普融示衆云德山入門便捧此豈不是成所作智玄沙與天龍遊山見虎此豈不是平等性智臨濟示衆云有一無位真人在汝等面門入出未證據者看看此豈不是妙觀察智雪峯示衆云我這裏似一面古鏡相似胡來胡現漢來漢現此豈不是大圓鏡智意謂用一圓覺為我一箇住處既以圓覺為所住之處則一切識性盡成圓覺之智即是十方諸佛生死本涅槃自性此之涅槃自性以順理故六通四闢大小精粗其運無乎不在更無方所可繫著不似小乘繫著方所也大菩薩者地上大乘菩薩也大因緣者不指小節之謂也善男子此名菩薩示現安居過三期日隨往無礙道場三期已滿小乘夏限未終以本非小乘安居故不妨隨往無礙也善男子彼末世修行衆生求菩薩道入三期者非彼所聞一切境界終不可取此總標於加行境所證境中誠觀不得取著邪謬境界故般若經云魔能入一切衆生心令皈依魔黨如漆身斷手截臂不能為難魔力之故人皆信伏又法華云深著虗妄法堅受不可捨此皆非是觀中所聞所見若夫信解行證雖然階級不同而所信所解所行所證之法始終無別若不是最初根本了悟覺性三重因地之法不應取著也謂解則解其所信修則修其所解證則證其所修也下文方列三觀謂靜幻寂也善男子若諸衆生修奢摩他先取至靜不起思念靜極便覺如是初靜從於一身至一世界覺亦如是衆生念者世界既全成覺而衆生全在覺中故所起之念無不了達如影入鏡鏡照無遺如像入壺壺應無惑非彼所聞一切境界終不可取此誡取邪境也天台教云凡在定中若見善相者當以三法驗之一以定研磨二依本修治三以智慧觀察譬如世上之人欲知真金以三法試之一燒二打三磨也如楞嚴鈔中説昔有禪師在山中坐禪忽見一孝子擎一死尸來向師前著便哭云如何殺我阿母師知是魔思之此是魔境我將斧斫却可不解脫便於拄上取斧遂斫一斧孝子走去後覺服上濕便看之乃見血出不期自斫也亦有一禪師坐禪時忽見一豬來在面前師謂是魔則捉擎豬鼻唱叫把火來小師來看乃見和尚自把其鼻唱叫斯乃皆是正坐禪時心中起見遂感外魔來入也所以楞嚴經中於五陰説有五十種魔者良由此也善男子若諸衆生修三摩鉢提先當憶想十方如來十方世界一切菩薩依種種門漸次修行勤苦三昧廣發大願自熏成種此幻觀也前至靜觀不假外緣今於幻觀門中須憑聖境前威德章幻觀即約大悲化生今道場之內且自尅修故約大智求佛也發願者謂䇿勵運意為發希求樂欲為願謂衆生無始已來念念希求五塵境今已了悟故發心念念樂欲悲智六度等境熏心成習也非彼所聞一切境界終不可取此誡取邪境也善男子若諸衆生修於禪那先取數門心中了知生住滅念分劑頭數如是周遍四威儀中分別念數無不了知此寂觀也數門者數字上聲呼此即數息觀也謂調和氣息令不澀不滑若數則從一至十想心在數不令馳散也良由數息之故息調心淨遂乃了達知覺心中生住異滅四相粗細妄念本末分劑頭緒數量無有不知者何也為心靜則覺動也今經無異字者即脫略也以論中所説十信凡夫覺滅相三賢覺異相十地覺住相位滿覺生相也生相者動念都盡唯是一心也上文則坐時覺智非唯坐時覺知是妄幻乃於行住坐臥四威儀中四相之念粗細本末頭緒數量一時知之知則無患譬如妖魅所欲著人若知其名自然消滅所謂知賊是賊賊無能為此數門者乃五停心中之一門也何謂五一多貪衆生佛令入不淨觀二多瞋衆生入慈悲觀三多散亂衆生入數息觀四多癡衆生入因緣觀五多障衆生入念佛觀漸次增進乃至得知百千世界一滴之雨猶如目覩所受用物謂淨心是圓覺自體而世界本在其中觀行成就全合根源知雨滴數固宜本分非唯雨滴萬物皆然舉一例諸且標雨滴也然凡夫之類迷此真心隨念所知故失其用也荀子尚云君子一之微處一之危危微之機君子能知之尚書云人心惟危道心惟微惟精惟一允執厥中華嚴經説龍王行雨摩醯首羅尚知滴數況行人入觀乎若究竟者直到佛位方知之今約觀中妙慧發生故許所見同佛耳非彼所聞一切境界終不可取是名三觀初首方便是名三觀初首方便者前圓覺菩薩問云三種淨觀以何為首故此結答云單修靜幻寂為初首方便也若諸衆生遍行三種勤行精進即名如來出現于世此即遍修也何謂遍修乃圓修靜幻寂三種觀也良由三觀既備萬行已圓故就此行人分上便是諸佛出世也又即此人本覺離念名為佛出佛即覺義圭峯云我心元與佛心齊曠劫沈淪只為迷菩薩乃梵語也唐言覺覺心寂照即菩提也若後末世鈍根衆生心欲求道不得成就此下互修也互修即復修也今初明鈍根之人修觀未成也由昔業障當勤懺悔常起希望先斷憎愛嫉妬諂曲求勝上心此重發誓願決心欲證加功勵志懺業斷惑也三種淨觀隨學一事此觀不得復習彼觀心不放捨漸次求證此正明互修也序云別遍互習者指此及上文也疏云有人被色相所礙空靜之觀難成先觀色幻幻即全空靜觀方成復有執定實色礙於心識難修幻觀先知其體本無而不妨覩相方成假幻復有修中難成絶待先知假全空而無假空全假而無空空假俱無絶於對待方成寂滅其中又有人直見心源方知諸法即性故空不壞相故假或但從性現故假無別所現故空今意若修靜觀不得者却許修幻觀若修幻觀不得者却許修靜觀二觀皆修不得者却許修寂觀也只如天台教云破一切惑莫甚乎空建一切法莫甚乎假究竟一切性莫甚乎中故一空一切空無假無中無不空一假一切假無空無中無不假一中一切中無假無空無不中反意可類爾時世尊欲重宣此義而説偈言圓覺汝當知一切諸衆生欲求無上道先當結三期懺悔無始業經於三七日然後正思惟非彼所聞境畢竟不可取奢摩他至靜三摩正憶持禪那明數門是名三淨觀若能勤修習是名佛出世鈍根未成者常當勤心懺無始一切罪諸障若消滅佛境便現前於此上十一章經文並屬正宗分竟其頓漸悟修者蓋此經文殊一章是頓解悟普眼觀成是頓證悟三觀諸輪是漸證悟圓覺一章道場加行是漸修悟耶嘗考禪家有二句之義一者最初句二者末後句初句即初發明之謂也須得末後句始到牢關今經亦然初文殊章頓解悟即最初句也普觀成頓證悟即末後句也如善財初見文殊與未再見文殊其意一同第三流通分謂正宗分中法義已周欲使廣益他方遠霑來世流傳通泰展轉無窮故有此分而來若都無人傳是不流流則不住不滯或傳之遇其障難是不通通則不壅不塞如水之流無礙也於是賢善首菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言賢則亞聖謂地前三賢位次十聖位地上菩薩也善則順理首是頭首然欲便萬善齊與俱順真理成因正位上次聖果者必藉經教流通經教流通是賢善之首故流通分當此菩薩請問也大悲世尊廣為我等及末世衆生開悟如是不思議事不思議事者近慶道場遠慶一部也謂一部經內世尊為上根人開示二空觀為中根人開示三觀諸輪為下根人開示道場加行如是種種法門離於精粗之域出於形質之外脫於言意之表故云不可思議之事而儒典尚云夫子之道上有出乎天之高下有入乎地之深瞻之在前忽然在後不可以形貌求不可以聰明此不思議同意也世尊此大乘教名字何等云何奉持衆生修習得何功德云何使我護持經人流布此教至於何地作是語已五體投地如是三請終而復始然正宗分中但問所詮法義雖已圓備凡心難可任持聞時領會分明過後恐還遺忘事須持教貫穿文既不遺隨文解義依義起觀方成真正修行故此問經名字也云何奉持者前雖已説即持法也今此問所者即持教也謂自遵奉行為人持説也流布此教者此行十法行也謂若人一向於此了義經教供養寫施聽受讀誦説釋思修如是分布流傳末代未審此人智慧功德畢竟至於何位地有菩薩地有佛地也爾時世尊告賢善首菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來如是經教功德名字汝今諦聽當為汝説時賢善首菩薩奉教歡喜及諸大衆默然而聽善男子是經千萬億恆河沙諸佛所説三世如來之所守護十方菩薩之所皈依十二部經清淨眼目説此經佛既是真身無礙塵沙同體故一説即一切説三真身世一時説無説無不説如華嚴經云我不見有佛國土不説此經若不知了義教者則隨方有説不説也三世如來之所守護者如法華云我等諸佛護持此法令未來世一切菩薩未曾聞者皆悉得聞十方菩薩之所皈依者謂因行之中無不從此法而成佛十二部經清淨眼目者良以推窮迷本照徹覺源是以理貫群經義無不盡於此若解則諸教煥然可見如指諸掌眼目者如人有眼一切境界歷歷可見也十二部經者亦謂之十二分教一契經二應頌三授記四諷誦五因緣六自説七本事八本生九方廣十未曾有十一譬喻十二論議此謂之十二部經也今此經即屬契經及方廣二分所攝也前諸佛所説如來守護菩薩歸依者此即定圓覺之法也十二部經眼目者此印定為一切經之宗也所以序云印定之法為一切經之宗也即指此文也問此經對三時五時之教否答頓教不論先後處所但遇頓機即説故不對三時五時之教也又難云既不對教者法華經云是法華經諸佛神力之所守護此又如何分耶答法華諸佛神力守護者即屬正宗也此經諸佛守護者即屬流通分也若彼經守護在流通分者即許不可揀之彼既屬正宗分是知不同也是經名大方廣圓覺陀羅尼亦名修多羅了義亦名祕密王三昧亦名如來決定境界亦名如來藏自性差別汝當奉持前問此大乘教名字何等云何奉持此答之有五名也然此經題者乃佛自立也且諸經得名有七種或體或用或果或彼人為目或以法為名人有請説等殊法有法喻等別或體或用或果或因或能詮或真或妄或境或智乍復乍單不同今經五名已含多種大者體也方廣者用也圓覺者果也祕密者因也王者喻也三昧者法也修多羅了義者是歎能詮也餘皆所詮如來是能證人也決定境界者即所證境也如來藏者即屬總乃在纏之名則真妄和合也又自性即空如來藏也差別即不空如來藏也斯則人法總彰法喻皆舉具體具用有果有因詮旨雙題真妄俱顯方諸經目莫備於斯了義之名題顯然矣而世尊遂敕令依此名法而持謂已悟而持謂已悟明心地者文字性離即是解脫不妨滿紙放光而持也若不悟明心地者迷一切諸法真實之性向心外取法而起文字之見見還將文字對治示其本來之性如以聲止聲以橛出橛以機奪機以毒攻毒無離文字如説修行而持義也善男子是經唯顯如來境界唯佛如來能盡宣説前云是諸衆生清淨覺地又説無明貪愛四病四相今云唯顯如來境界者既云唯顯佛之妙覺不思議境界獨佛方能盡其所説其所説者何耶謂説衆生無明皆無所有止是佛境佛境若不顯現衆生豈得皆空生若不空豈徹覺地故華嚴信位即佛境皆是此意也然後代淺識劣解之人以謂佛法止此此者觀是説也若諸菩薩及末世衆生依此修行漸次增進至於佛地前問流布此教至於何地今答云良由此經唯顯佛境故修十法行之者必至佛地佛地即妙覺位也所謂不住化城便躋寶所在禪家謂之不動凡夫便登佛位善男子是經名為頓教大乘頓機衆生從此開悟亦攝漸修一切群品賢首國師以一大藏教深淺之義判為五教五教者一小乘教即四阿含經是二大乘始教即八部般若是三大乘終教即楞嚴涅槃寶積等是四大乘頓教即圓覺楞伽等是五大乘圓教即華嚴是今經乃屬頓教獨被頓機衆生於頓機中又分為上中下三根也疏云宗門是頓教事具漸門既頓漸俱收則遲速皆益會與不會入與不入皆可留心所以修山主云會得甚奇特不會也相許譬如大海不讓小流乃至蚊虻及阿修羅飲其水者皆得充滿此舉喻也大海喻頓教小流喻漸教蚊虻喻二乘阿修羅喻菩薩飲其水等者喻二乘之人受持此經皆得悟入疏云大海有無量之水而飲之者則量腹多小圓覺有無邊之法門而受持之者隨器頓漸善男子假使有人純以七寶積滿三千大千世界以用布施不如有人聞此經名及一句義此顯福也法會既終所談上中下三根及談因果法義復恐後代衆生不信修如是因感如是果遂於此流通分中一道較量功德歎使後人生信欣樂也如金剛經中兩重因果三番較量之意梵語檀波羅蜜此云布施謂運心寬廣曰布輟己惠人曰施此布施一度衆行皆攝華嚴經説有十度一布施謂財法無畏無不皆捨二持戒謂防非止惡內外無瑕三忍辱違順不干諦察忍可四精進離身心相萬法增修五禪定念慮皆忘安理境六般若無分別善達心空七方便涉有常空施為無八願度上求下化窮盡未來九力度思修成功萬境不動十智度決斷無惑證法頤神今以布施一度以較量經福也一句義者此顯勝七寶也意謂雖以金銀琉璃赤珠等寶不為自己求安樂之故普施與一切衆生者是有為有漏之因感得人天果報譬如仰箭射虗空勢力盡箭還墜招得來生不如意今若聞此經一句合宜之義如説修行斷惑遣疑是無漏最上之因便能超夢幻出輪回直趣無上佛果菩提所以此功德勝過前七寶布施功德也疏云世珍盈剎能為漏果之寶妙法一字必獲菩提之報禪家亦云識得一句一生參學事畢在教家亦云教典千文一心能貫之在書云詩三百一言以蔽之在記云通於一萬事畢在説云吾道一以貫之古詩云學雖不多可齊上如是則歸同反一一處既通千處萬處一時透脫所以道一葉落天下秋一塵起大地收一華開天下春一事寂萬法真與此一句義同意也善男子假使有人教百恆沙衆生得阿羅漢果此顯劣智也梵語阿羅漢此有三義謂不生應供無賊也恆河者方四十里其沙細如假饒教得一百箇恆沙中許多數之人尅獲成就小果聖人者其福非是究竟故乃劣也不如有人宣説此經分別半偈上文舉劣此顯勝也意謂使教百恆沙衆生得阿羅漢果所得功德不如有人代佛宣揚此經半偈之功德也疏云凡全偈者所謂四句句有二種一文句二義句若約文句即兩句為半偈若約義句即説一切法本來空寂是半偈也顯空體不空是全偈他善男子若復有人聞此經名信心不惑此明聞信也不惑即不疑惑也然大乘教法無量劫來難見難聞或時聞已不信不順不悟不入者有之矣所以論語云人無信不知其可也夫圓覺深旨一心妙門非大智而不能觀非大根而不能信觀即舉佛智也信之即入圓覺但懇志無疑決取於成辦也當知是人非於一佛二佛種諸福慧如是乃至盡恆河沙一切佛所種諸善根聞此經教此驗宿因也金剛經云當知是人等於一佛二佛三四五佛如而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者諸善根者不過是貪嗔癡三毒發聞思修三慧也然此經宗信者必是即解之信信該果海不是小緣故驗其宿因曾積信種汝善男子當護末世是修行者無令惡魔及諸外道惱其身心令生退屈前問云何護持今答云但莫令惡魔外道惱其身心者即是護持也近有人撰其偈詞添入經中蓋不知此是流通分故閲者幸勿疑焉爾時世尊欲重宣此義而説偈言賢善首當知是經諸佛説如來善護持十二部眼目名為大方廣圓覺陀羅尼現如來境界依此修行者增進至佛地如海小流水飲者皆充滿假使施七寶積滿三千界不如聞此經若化河沙衆皆得阿羅漢不如宣半偈汝等於來世護是宣持者無令生退屈爾時會中有火首金剛摧碎金剛尼藍婆金剛等八萬金剛并其眷屬即從座起頂禮佛足而白佛言世尊若後末世一切衆生有能持此決定大乘我當守護如護眼目乃至道場所修行處我等金剛自領徒衆晨夕守護令不退轉其家乃至永無災障疫病消滅財寶豐足常不乏少此下稟命加衛外護流通也火首者此神頭有火焰手中執金剛杵也爾時大梵王二十八天王并須彌山王護國天王等禮佛足右繞三匝而白佛言世尊我亦守護是持經者常令安隱心不退轉大梵王者即初禪天主也二十八天王者即三界主也須彌山王者即帝釋也護國天王者即別指四天王也爾時有大力鬼王名吉槃茶與十萬鬼王即從座起頂禮佛足右繞三匝而白佛言世尊我亦守護是持經人朝夕侍衛令不退屈其人所居一由旬內若有鬼神侵其境界我當使其碎如微塵吉槃茶者亦鳩槃茶此鬼食人精氣其疾如風管林野諸鬼衆一由旬者即四十里也佛説此經已一切菩薩天龍鬼神八部眷屬及諸天王梵王等一切大衆聞佛所説皆大歡喜信受奉行疏云良由文殊所問經説有三種義歡喜奉行一能説者清淨不取著名利所染故二所説法清淨以如實知法體故三得果清淨即説益也問經首信成就與此信是同是別耶答前信淺此信深何以知之大智度論云如是我聞生信也信受奉行生智也信為能入智為能度又云信為入法之初機智為究竟之至要雖深淺之不同在智信一貫則無別也應辰伏聞性均一天本無間斷識昧六塵遂分迷悟賴有圓覺性海明頓漸之所歸了義真乘混聖凡而同際指衆生要徑示諸佛真源是故一切衆生聞所未聞得所未得然理藏於隱則聞者晦妙入於玄則得者艱故曰圓覺未嘗圓覺應辰分湔薄資性愚蒙周嘗覽圭峯之微言波翻巨海得復庵之類解霧廓晴天敬勤諸版願廣其傳庶幾口誦目擊意悟心開咸住大光明藏共登妙圓覺場所期妙利恭願祝奉兩宮無疆之壽報雙親罔極之恩凡在見聞悉霑餘潤淳𠘕己亥長至日承信即沈應辰謹識稽首十方佛經法并僧衆願以書寫力廣度於一切先報亡親恩及酬師匠德普濟諸群品同證於種智
