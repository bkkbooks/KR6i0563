body:
  text: 未出輪迴而辨圓覺彼圓覺性即同流轉若免輪迴無有是處此真隨妄轉謂若用前始終生滅前後有無聚散起止種種取捨不出輪迴三界之心明辨如來廣大圓覺之時便妄見如來圓覺之性亦同妄心有始有終有生有滅有前有後有有有無有聚散起止動轉流散然而圓覺之性本不曾流散動轉但是不合將妄心湊泊妄見耳譬如世人將筯攪水中之月一般正當攪時却見水中之月百雜千碎隨手中筯流轉而本月何曾動靜今行人若將妄心湊泊圓覺真性欲超夢幻出輪迴如此用心一時錯了豈有是處此上經就法說之也譬如動目能搖湛水又如定眼猶迴轉火雲駛月運舟行岸移亦復如是次就喻眼轉火者即以手旋火成輪此蓋眼識遲鈍妄見成輪駛者奔流急走之義此四克取親所見之物為喻然水成波火成輪但是眼目定動喻於圓覺見凡見聖但是流轉妄心岸移月運雲駛舩行亦同此意亦復如是一句總結四喻合前法也此四喻亦如行人將未出輪迴妄心而明辨圓覺便妄見圓覺之性亦同流轉然此四喻不必配法但用眼前可見之物譬之令其易曉善男子諸旋未息彼物先住尚不可得何況輪轉生死垢心曾未清淨觀佛圓覺而不旋復此一段文先合喻次合法諸旋未息至尚不可得此合喻也諸旋者指喻中眼目雲舟彼物指水火月岸也眼目雲舟喻前始終生滅等生死垢心水火月岸喻圓覺世尊告金剛藏云且如世間之人不肯住目只要湛水不搖動尚不能得又如定却眼睛只要旋火不成輪尚不能得又如天上雲奔流急走不肯住只要月不運行尚不能得又如江河水上之人不肯住舩只要兩岸先住尚不能得此皆是世間容易麤淺不難之法尚自千難万難要他先住尚不可得又豈況凡夫之人直將無量劫來始終生滅前後有無聚散起止種種取舍分別計度輪迴生死垢污之心求覓十方諸佛廣大不可思議清淨圓覺境界如何得妄見佛之圓覺不隨汝等妄心旋復流轉耶是故汝等便生三惑此結指前疑以是上來所說因之故剛藏等便生三疑一疑由真能生妄二疑說妄為真三疑先真後妄上來之文且是佛先為剛藏等標舉建立答問之義便令息如上之念即前疑自亡也下文將空華一喻通答三疑金鑛一喻則答第三疑牒而縱之責無窮過也善男子譬如幻翳妄見空華幻翳若除不可說言此翳已滅何時更起一切諸翳何以故翳華二法非相待故幻之一字若據圭峯疏云謂不知華因翳有妄執華從空生推此之意謂譬如世人眼才有翳便見空中有華法上心若有妄便見輪回所謂一翳在眼千華亂空一妄在心河沙生滅謂眼瘡有患翳便見空中有華眼翳若差空華即滅既滅之後又不可更說此眼翳已除不知此去幾時眼中更生翳耶譬如人睡起夢覺又更云何妨明夜再夢今此翳差華亡眾生即佛人罕能華知又徵云以何義故不可說此翳更起耶却為眼中翳才差而空中便無華此之二法同時而起同時而滅非是一箇先去一箇尚在此相待等決無此理翳喻無明華喻生死如眾生若有無明執心便見有生死此心若除便見無生死豈可此無明去後又有生死者也所以圭峯云眾生本自不生空華畢竟不起莫將翳待莫以迷求此之謂也亦如空華滅於空時不可說言虗空何時更起空華何以故空本無華非起滅故前說翳不再起此說華不再生乃是通答前剛藏三疑謂又如空華在虗空中滅了汝等又不可更作此見解謂空中此去幾時更再起華徵云以何因由所以之故不得言空華再起耶為虗空中本自無華既本不曾有華必無華起華滅之理今法上亦然十方諸佛成等正覺之後豈更再作凡夫所以圭峯云空華既不再起果位何得再迷生死涅槃同於起滅妙覺圓照離於華翳此時法合喻云但是眾生迷時見有生死如空華起悟時見有涅槃如空華滅但是見有凡夫見有聖人並是生心動念即乖法體失正念故殊不知十方諸佛不思議妙覺圓照之體本無眼翳之無明本無空華之生死所以楞嚴云真淨界中云何更容他物禪宗云他家無如是事善男子當知虗空非是暫有亦非暫無況復如來圓覺隨順而為虗空平等本性列子云天地乃是有形中之最巨者空中之細物此謂萬物雖有形狀不如天地之形最大若以萬物觀之則天地為大若以無邊虗空觀之則天地未足為大乃是虗空中之細物爾何也謂虗空又包却天地據他道教所談止此而已今我佛於楞嚴中說則又不然經云空生大覺中如海一漚發謂虗豁無知無覺頑空生在十方諸佛廣大靈明圓覺妙性之中如大海中一浮漚或沈或浮相似大海即喻妙覺一漚即喻虗空是知此說又過於列子之說故殻法師云首楞嘆虗空之小圓覺嗟法性之寬比之常談海形牛迹若以尋常列子之說比於世尊之說世尊之說如海之形廣大深遠無窮無盡列子之說如牛迹之狹真淺有限謂汝等須知外面頑空乃是世間麤淺之法尚不同空華暫起暫滅暫去暫來何況諸佛廣大真實常住隨順圓覺之性而能與虗空混同一體無二無別平等之性豈有同凡夫之迷同二乘之悟如空華起滅耶此意明覺性無迷無悟無染無淨無去無來無生無滅湛然常住廓爾無私裏許無一絲毫許是生滅法永嘉云大千沙界海中漚一切聖賢如電拂善男子如銷金鑛金非銷有既已成金不重為鑛經無窮時金性不壞不應說言本非成就如來圓覺亦復如是此再舉喻也如人以爐冶銷去其鑛鎔出真金金在鑛中須假鎔出金既出後金性之體本自有之又不是因銷而復有若是銷因方有金者試將瓦礫土石等物銷之又不見有金是知此之金性本自有之既然成金之後豈更有再作鑛之理假使經無窮之時此金性應無改變損壞楞嚴云又如金鑛雜於精金其金一純更不成雜到此謂之病去藥除鑛銷金見若如此之時不當說言此之金性本不成就喻說也如來圓覺亦復如是此二句就法法合也意謂十方諸佛已於三祇修鍊得成正覺不復再為凡夫也然剛藏前起三疑世尊遂以前段空華一喻通答三疑又以此段金鑛一喻別答第三疑者蓋第三疑牒而縱之責無窮過所以須將金鑛一喻別答第三疑者蓋第三疑疑諸佛成等正覺之後却再作凡夫此疑過患甚深所以別答之此兩喻如兩服藥相似修行之人皆要服之若世尊但用前空華一喻即令後代眾生闡提撥無因果迷悟之相便成邪見若但用金鑛一喻即令一切眾生本覺性上有染不清淨滯在修習以謂自是凡夫未曾修行如何是佛失真常理亦成邪見又前空華一喻對治大即病不即不離方處手中道故也善男子一切如來妙圓覺心本無菩提及與涅槃亦無成佛及不成佛無妄輪迴及非輪迴妙則染而不染圓者離相覺者不空心者常住真實之心何謂染而不染此圓覺性若在佛果之時即全同諸佛而圓覺之性不是佛若在菩薩界即全同菩薩而圓覺性不是菩薩乃至若在聲聞緣覺天人地獄餓鬼畜生即全同天人餓鬼畜生等而此覺性非聲聞畜生等此謂染而不染何謂之圓者離相謂此圓覺體上非青黃赤白陰陽高下長短方圓邪正等相此謂之離相何謂覺者不空謂此圓覺性不是無知無覺虗豁斷滅頑空而裏許有大智慧光明義徧照法界義真實識知義清涼不變義常樂我淨義具足如是過於河沙無量無邊功德一時滿足此謂之不空也心者無像無名無依無住細入無間之中而不可言其小大包乾象之外亦不可語其寬處聖稱真在凡號俗如金作器隨器得名在指曰鐶飾臂曰釧不可以智知不可以識識此謂之心也此是先標十方如來圓覺妙心為宗下方拂迹也本無菩提及與涅槃者及與涅槃者謂因地轉煩惱果上證菩提因地轉生死果上證涅槃此是二轉依號此名皆是因妄而得而圓覺中本無此事也又成佛不成佛輪迴非輪迴兩對四雙皆是對待之法而覺性之中亦都無此若存小見則迷圓覺華嚴云於法若有見此則未為見若無有見者如是乃見佛圭峯云靈靈自覺元無物擾擾他緣盡是空善男子但諸聲聞所圓境界身心語言皆悉斷滅終不能至彼之親證所現涅槃聲聞之人皆於鹿野苑請佛三轉法輪聞聲悟道故曰聲聞三轉法輪者初曰示轉二曰勸轉三曰證轉初示轉者佛告云此是苦此是集此是滅此是道次勸轉者此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修次證轉者此是苦汝已知此是集汝已斷此是滅汝已證此是道汝已修此謂之三轉法輪也此聲聞之人於音聲中而得聞解聞佛宣說苦集滅道四諦法門於是悟道今且將此比較謂聲聞圓修有餘涅槃并無餘涅槃之境界不執四大五蘊妄身并六塵緣影妄心一切所有言句皆悉斷滅無執著之心一向沈空滯寂灰身滅智如此修行尚不能造到聲聞親證所現有餘涅槃并無餘涅槃也有一種聲聞人作如是言我梵行已立所作已辦不受後有已出三界已無生死不妨留此身飛行自在與一切眾生供養此謂之證有餘涅槃所以肇云餘緣不盡餘迹不泯業報猶魂聖智尚存又一種聲聞人作如是言我梵行已立所作已辦不受後有已出三界已無生死安用此身於是自放三昧火焚之歸無此謂之證無餘涅槃所以肇云夫聖人灰身滅智掃形絕慮內無機照之勤外息大患之本超然與群有永分渾爾與太虗同體冥冥長往莫知所之問既是聲聞人身心語言皆悉斷滅何故楞嚴經云如何三有眾生及出世間聲聞緣覺以所知心測度如來無上菩提用世語入佛知見耶答二經意同但語言別爾蓋二乘人於今經中斷滅所知之心尚不能證自己之道豈況楞嚴經中許有所知用世語言入佛知見愈不許也何況能以有思惟心測度如來圓覺境界前證我空之理及證我空之智是聲聞小乘人如此加功練行妄情泯迹修行尚未能到豈況凡夫之人直用前始終生滅前後有無聚散起止種種取捨未出輪迴思惟分別計度識心便要擬測度量十方諸佛廣大圓覺清淨不思議界中湛然常住廓爾無私亘古亘今不生不滅豈可以心測度也若根身器界種子許第八識緣若有漏無漏二法及四我許第七識緣若三性通內外一切差別之法許第六識緣若色聲香味觸許前五識緣此圓覺不可思議若以思惟心學法者譬如幻刀斫石若霧染空相似終不能得所以圭峯云百僚尚畏宰相百姓豈親天子百僚者喻聲聞宰相者喻所現涅槃百姓者喻凡夫思惟妄心天子者喻如來圓覺也古云自古上賢猶未到造次凡流那得知此二段文謂之舉聲聞之勝彰凡夫之劣凡事莫不勝從劣顯順由逆彰也如取螢火燒須彌山終不能著以輪迴心生輪迴見入於如來大寂滅海終不能至螢火即凡夫思惟妄心須彌山亦云妙高峯此喻圓覺然此山出水八萬四千逾繕那入水八萬四千逾繕那又安可用不真之火而擬燎者哉經云如人聚集於螢火欲燒四寶大峯巒縱使勤勞經累劫豈能損著一毫端楞嚴云阿難汝今云何於中措心以諸世間戲論名相而得分別如以手掌撮虗空祇益自勞虗空云何隨汝執捉次文法合可見但寂滅喻圓覺境界也是故我說一切菩薩及末世眾生先斷無始輪迴根本此勸止息思惟妄心根即舉喻喻如樹根也本即舉法愛為本也古云伐樹不盡根數數更生樹斷愛愛不盡數數得生苦善男子有作思惟從有心起皆是六塵妄想緣氣非實心體已如空華用此思惟辨於佛境猶如空華復結空果展轉妄想無有是處有作思惟者即再顯前始終生滅前後有無聚散起止種種取捨思惟計度之心此心從第六意識上起問何故有此識心耶答為因有色聲香味觸法六塵之法遂牽引起中間能攀緣分別之心此心乃是真心上起一分緣慮影像妄心如水上之泡如鏡中之像如空中之華此心常與真心氣分契合所以楞嚴會上慶喜執心而無據直得七處茫然此並不是真實之心體一似空中之華且空中華是實是虗耶只此自是一重妄想而修行之者又不知覺悟却用此思惟妄心要求辨別明了十方諸佛廣大圓覺不思議境界却是兩重妄想如見空華已是不是又見結果又是一重妄想如此展轉相依一時錯了有甚是處所以楞嚴云汝等皆是迷中倍人又云觀相元妄無可指陳猶邀空華復結空果誠哉是言得不銘心者哉善男子虗妄浮心多諸巧見不能成就圓覺方便此指金剛藏前三疑皆是無量劫來熏習顛倒妄想分別虗浮不實特地生出巧偽之見終不得斷障遣疑證入成就十方諸佛廣大圓覺方便之法門也如是分別非為正問此結三疑謂於佛法中不是真正當理之問也爾時世尊欲重宣此義而說偈言金剛藏當知如來寂滅性未曾有終始若以輪回心思惟即旋復但至輪回際不能入佛界譬如銷金鑛金非銷故有雖復本來金終以銷成就一成真金體不復重為鑛生死與涅槃凡夫及諸佛同為空華相思惟猶幻化何況詰虗妄若能了此心然後求圓覺偈云譬如銷金非銷故有此二句說本有之法對治有修金鑛執雖復本來金終以銷成就此二句對治無修執思惟猶幻化此頌長行中有作思惟從有心起至已如空華何況詰虗妄此頌用此思惟辨於佛境謂前思惟之心自是虗妄幻化豈況又將此虗妄之心詰辨分別圓覺境界如是分別展轉不是也於是彌勒菩薩在大眾中即從座起頂禮佛足右遶三迊長跪叉手而白佛言此深究輪回之根也彌勒此云慈氏乃是其姓也良由此門深究愛根蕩除細惑窮其展轉根元推其差別五種之性彌勒是等覺菩薩一生補處表除細惑大凡教中說等覺位方斷四事四事者一劣無漏二微細習氣三分段生死及變易生死四內外轉依斷此四事方入妙覺故當彌勒請問大悲世尊廣為菩薩開祕密藏令諸大眾深悟輪回分別邪正能施末世一切眾生無畏道眼於大涅槃生決定信無復重隨輪轉境界起循環見深悟輪回即慧眼分別邪正即法眼然慧眼證真法眼達事又慧眼即根本智法眼即後得智然天台以根本智為拙智謂只證得自己之性以後得智謂能鑒機逗教分別邪正說法度生言道眼即具上二眼也決定信者即能信之智大涅槃者即所信之法無復重隨輪轉者即指前雲駛月運等也世尊若諸菩薩及末世眾生欲遊如來大寂滅海云何當斷輪回根本於諸輪回有幾種性此舉法以請先斷輪回也大則絕對待之大性本自靜曰寂相本自寂曰滅海是喻喻如大海體深用廣具河沙功德遊者不住即指無住處大涅槃也當斷輪回根本者由前剛藏章聞佛說末世眾生先斷無始輪回根本今請問未審是那箇根本如何斷絕并諸輪迴六趣之中有幾般種性之人也修佛菩提幾等差別迴入塵勞當設幾種教化方便度諸眾生此請悲智也修佛菩提幾等差別此當大智回入塵勞至眾生此當大悲又初則從假入空觀次則從空入假觀又初當無邊法門誓願學次當無邊眾生誓願度上文說云何當斷輪回根本者此當無邊煩惱誓願斷然諸佛有無量無邊門亦要學之何謂之無邊法門只如一代時教修行法門以至禪門諸方尊宿接人差別之智各自不同既知諸法之門便須依文解義悟理見性之後此方是自行無邊事然後却要行利他之行何故却要行利他之行耶緣為根本智只了得自己邊事謂之理孤事寡終不圓通隻翼單輪豈能飛運譬如一水無以和其味一木無以成大廈一衣無以稱眾體一藥無以療殊疾一綵無以為紋綉一聲無以諧琴瑟一言無以勸眾善一戒無以防多失只如華嚴會上大海龍王置十千之間普慧并申二百之疑若遇斯機當如之何所以釋迦老子有後得之智遂為龍王開八萬塵勞之門答普慧大士二千樂說之辨今欲鑒機說法行利他行者亦復如是直須要會於無言說中假以言說於無方便中假立方便於無譬喻假立譬喻念念慈念念悲行無緣慈作不請友廣開方便饒益有情利樂群品以此推之後得智者真巧智也所以禪宗道大凡參玄之士須具二眼一己眼明宗二智眼辨惑序云佛稱種智修假多聞又壽禪師云百川雖潤何妨大海廣含五岳自高不礙大陽普照也惟願不捨救世大悲令諸修行一切菩薩及末世眾生慧目肅清照曜心鏡圓悟如來無上知見作是語已五體投地如是三請終而復始慧目即能照也肅清則塵緣影像一切境界皆不雜壞也照曜即所照也心是舉法鏡是舉喻謂欲使末世修行之人於十二時中能照之智及所照之境如鏡對像互不相瞞於中不受不拒物來斯照物去斯忘應變無窮卷舒自在若能如是即圓滿證悟十方如來無上智見也圓悟即無能所世間之法莫能先之故曰無上然無上知見者謂見聞覺知也此舉初後攝中間耳何謂之無上知見古云有所知有所不知無所知無所不知有所見有所不見無所見無所不見且有所見有所不見者如夜秉燭相似有所照有所不照也無所見無所不見如日輪升空天下洞然也且行時若見有行底則不見住時底坐時若見坐時底則不見有臥時底唯是行時不見行住時不見住以至坐臥時不見坐臥底乃至見聞覺知於一切處一切時不妨行住坐臥見聞覺知千差萬別一時坐斷觸目對境無非是登解脫清淨法殿無非是證大圓覺妙莊嚴域這箇喚作無上知見豈有世間虗幻之法而過得此法也如是會者方始有大利益所以古云無心則十方諸佛千里同風有知則十方諸佛對面胡越又老子得此道理乃曰不出戶天知天下不窺牖見天道若約教家配者無上知見聖涅槃性菩提即涅槃法也爾時世尊告彌勒菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生請問如來深奧祕密微妙之義令諸菩薩潔清慧目及令一切末世眾生永斷輪回心悟實相具無生忍汝今諦聽當為汝說時彌勒菩薩奉教歡喜及諸大眾默然而聽心悟實相實相具無生忍者實相者於一切法上不動乃無相之相若出其體即圓覺也忍者有五若資粮位伏忍見道位初地謂之信忍修道位二地至六地謂之順忍通達位七地至九地謂之無生忍無學位十地至妙覺謂之寂滅忍當五忍中無生忍也謂前章說一切眾生未悟輪回妄見生滅今既悟實相了妄心既不生輪回永絕如是即可名無生忍也善男子一切眾生從無始際由有種種恩愛貪欲故有輪回答中別釋愛本中約欲以標指此指四生九類種種者或天屬之恩如父母等或感事之恩或任運生愛或因敬成愛因恩成愛恩之與愛種種不一今貪欲者的指婬欲也若諸世界一切種性卵生胎生濕生化生皆因淫欲而正性命當知輪回愛為根本二約受生即欲界六天及五趣雜居之中正者受也古云愛不重不生娑婆念不一不生淨土生娑婆者皆因愛欲之心重也且如忉利天以交抱為行欲兜率天以執手為行欲化樂天以戲笑為行欲他化自在天以相視為行欲以至鴉以觜傳氣鵲以枝傳繞此皆因淫欲受身命也凡世間之人臨命終時若一生作善法之人先從下冷上至臍自頂以上煖氣後盡者即生人道若至頭面熱後盡者此人即生天道也若一生造十惡者與此相反從上至腰熱後盡者墮於鬼趣從腰至膝熱氣後盡者墮於畜生中從膝已下乃至脚熱氣後盡者墮地獄中無學之人入涅槃者或在心煖或在頂煖又死之後若一生善法功德多者即生善道惡業重者即墮惡趣善惡相半未定者遂於暗昧之處謂之中有身須四十九日自定之如秤秤物相似若善業稍勝即先受善趣若惡業稍勝即先受惡報後受善報滿足之後復還受生臨受生時所有詫生之處雖遠由業力故見在目前有福之者或聞大眾歌舞聲鐘鈴羅皷聲兼寂靜美妙種種可意之聲無福之者或聞風雨雷電聲江河泛漲聲及紛亂種種不可意之聲是時或妄見自身入臺觀宮殿之中或見身入荊棘叢林聲芦華之中若變成男者於母胎中即起男人欲心背外而面向內在其左脇若變成女者即於父身上起女人欲心背內而面向外在其右脇是時父精母血和合己靈即生歡喜乃託彼生矣在母腹中生臟之下熱臟之上母噉一坏熱食之時其體如在鑊湯母飲一坏冷水之時其體猶如寒氷切身母飽之時迫窄體痛不可具言母飢之時腹中亦似倒懸其苦無量此說卵胎受生若濕化二生者則又不然濕生但染香故若至生處此香或淨或不淨墮其宿業所感也若化生者但愛樂所依之處或好或惡亦隨宿業所感俱舍云顛倒處欲境濕化染香處凡在胎中三十八箇七日方得出生一七如生酪二七如凝酥三七如藥杵四七如溫石五七體形漸現六七現肘膝七七生手足八七現二十指九七生眼耳等十七如浮囊十一七身孔通十二七生腸骨十三七生飢渴想十四七生筋十五七生諸脉十六七諸孔出氣十七七眼鼻等明淨十八七諸根長十九七具三根二十七生諸骨二十一七生肉二十二七生血二十三七生皮二十四七生膚二十五七生肉增長二十六七生髮毛爪甲二十七七各隨善惡業苦相一一覺知二十八七生顛倒想二十九七現形色三十七毛爪增長三十一七至十五七人相具足三十六七生厭離想三十七七生五種惡想三十八七欲生之時母腹風起或上或下轉其兒身令倒懸頭向於產門猶如兩石夾山其身福者時心自念言我投浴池水中遊戲如墮高床華香之處其無福者時心自念言吾從高山墮落懸岸溝坑溷中或如地獄羅網荊棘之上及曠野石間劒戟之中愁憂無量又欲生之時母危兒怖生墮草上身體細軟風草觸身猶如履刀劒之上忽然失聲大叫其痛苦亦無量出生之後一七日內身中方生八萬戶虫以此推之四生九類莫不皆因婬欲中而受其身以至竛竮五趣匍匐四生無由解脫者皆由愛欲為根本根是舉喻本是舉法何以知之伐樹不盡根數數更生樹斷愛不盡本數數得生苦良可為證由有諸欲助發愛性是故能令生死相續欲助成因也由者因也諸欲即境愛性即無量劫來種子由外塵境牽起愛心種子所以十二時中愛繩萬結情網千重因此愛心貪欲故造業造業故受報由此生死不斷因緣相牽譬如磁石吸針針乃北方銕此屬陰石乃南方之物南屬陽由陰陽相感耳楞嚴云我愛汝色汝怜我心以是因緣百劫千生常在纏縛肇云眾生所以久流轉者皆由著欲故也若欲止於心無復生死也欲因愛生命因欲有眾生愛命還依欲本愛欲為因愛命為果此明因欲故因果展轉更相依倚不斷欲謂貪婬命謂身命若無愛欲則不生此身當知一切眾生欲從能愛之心上有既於過去因有婬欲生得此身今生又就此身之上又生愛惜保護貪著之心由愛此身所以之故又依傍此身作來生婬欲之因因此又感來生生死果報如是展轉相續無窮故云愛命為果由於欲境起諸違順境背愛心而生憎嫉造種種業是故復生地獄餓鬼此惡業招苦報也違者不可意順者可意由愛彼境境不順心便生熱惱憎嫉起嗔之故或殺或害或打罵凌辱種種惡業若境順愛心而生染著婬盜飲啖侵奪綺妄種種惡業若於十二時中如此用心者遂感三途之報若起嗔心感地獄之報若起癡心感畜生之報若起貪心感餓鬼之報不言畜生者有二義故一欲成文二舉初後攝中間也知欲可厭愛厭業道捨惡樂善復現天人此造善招樂報也謂前文說眾生則不知不覺起惑造業墮於惡道今已知覺悟前來起貪欲之心非是善道深可厭捨念念即是愛厭於三途惡業之道遂捨去能造十惡之心却起樂十善法功德之心修信進念定慧得十善之法若於十二時如此用心遂感人間及六欲天福報雖然如是亦未為善何也為人間有八苦天上有五衰八苦者一生苦二老苦三病苦四死苦五愛別離苦六怨憎會苦七求不得苦八五陰熾盛苦五衰者一衣垢染二華鬘萎顇三兩腋汗流四體便臭穢五不樂本座廣說五衰八苦見文殊章又知諸愛可厭惡故棄愛樂捨還滋愛本便現有為增上善果此感色界不動業也依報謂又不知其前來愛造惡及愛造善之心但未免苦輪遂棄彼愛心及樂修善心一時皆捨去又不知此之捨心與彼愛心一般依前潤起愛心之本如此用心乃是有為之心感得色界漸漸增上無色界正報俱舍論云梵王天人身長十由旬無色界天人身長三十六由旬不動業者謂因不動果不動也因則不被下欲界境之所動果則不被四禪心定之所動也如初禪不被欲界境之所動二禪又不被初禪境界之所動三禪又不被二禪境界之所動如是漸增至四空處天也皆輪迴故不成聖道此總結也以是上來所說愛欲之心不斷受三途之報捨心不斷受上二界之報此皆三界生死出六道輪迴者必先依佛所說斷除貪婬之心及能起愛渴之心愛心喻渴求水之謂報應云事起必由其心報應必由其事是故自報以觀事而事可變舉事以責心而心可反譬如世人欲要流乾先須竭其源欲要湯不沸先須除其火所以古云擁其流者未若扗其源揚其湯者未若撲其火由源出於水源未扗而水無窮火沸於湯火未撲而湯誰息故有扗源之客不擁流而自乾有撲火之賓不揚湯而自止類斯而談可得詳矣厭其果者未若絕其因怖其苦者未若懲於惡因滋於果因未絕而果未窮惡生於苦惡未懲而苦詎息故使絕因之士不厭果而自亡懲惡之賢不怖苦而自離凡百君子書而誡歟所以道一切眾生輪迴根本只是貪欲及愛三字也前文殊章無明為生死根本此即發業也今彌勒章以貪愛為輪迴根本此即潤業也諸經或說發業未若此經文簡而具備矣善男子菩薩變化示現世間非愛為本但以慈悲令彼捨愛假諸貪欲而入生死此通妨慈能與樂悲能拔苦恐有此疑害其觀智只如龐居士豈是真箇縈妻育男養女貪著世間之事耶又如猪頭和尚等皆菩薩化現但是示現受生同於凡夫為欲利益調伏攝受教化一切眾生故也若諸末世一切眾生能捨諸欲及除憎愛永斷輪迴勤求如來圓覺境界於清淨心便得開悟此顯覺也一切眾生能捨諸欲及除增愛永斷輪迴者此一段文約禪宗說之乃是熟處放教生其次勤求如來圓覺境界於清淨心便得開悟者乃是生處放教熟約教宗說者先是出鑛後方成金已上經文總答彌勒前問欲遊如來大寂滅海云何當斷輪迴根本今告云愛欲二字也善男子一切眾生由本貪欲發揮無明顯出五性差別不等依二種障而現深淺二明種性中總標因依發則顯發揮則揮散無明即根本煩惱謂一切眾生因背覺合塵貪欲之故遂發顯揮散根本無明是時便顯出聲聞性緣覺性菩薩性外道性不定性各各差別不同何故如此為始初遇著邪師教者則於人法二我上堅執不捨此障對於二乘為深若遇二乘之教說人空理雖已知人空其於法執未忘對前邪師為淺若遇菩薩之教對二乘又為淺也然此眾生覺性之上本無深淺之障但隨其所薰習耳云何二障一者理障礙正知見二者事障續諸生死此所依二障也凡夫有我執即前妄認四大為自身相故曰事障所以竛竮四生匍匐六道二乘有法執故曰理障所以有智無悲左此二障若在起信論謂之我執法執蓋起信說初於本覺上一念不覺動心為業相有所見為轉相境界現為現相起分別心為智相此心不斷為相續相此五皆謂之法執起取著之心為執著相於執著處計度其名字為計名字相此二相屬我執若在唯識謂之煩惱障及所知障為煩惱障障心心不解脫所知障障慧慧不解脫若在此經謂之理障事障若二障之體在起信論二障之義在唯識論二障之名在今經也天台教煩惱曰界內見思所知曰界外見思注曰我執即一蘊之色法執即四蘊之心在參同契謂之執事猶是迷契理亦非悟故楞嚴經云初伏客塵煩惱又云永斷根本無明大意皆同云何五性此徵問也性字從心從生謂從心而生謂之性善男子若此二障未得斷滅名未成佛此簡未熏之者正當楞伽經中無性此經本以發心修證約二障故成五性此一種人都未曾聞佛教未熏修性二障未曾斷故不當其五性中之數也若諸眾生永捨貪欲先除事障未斷理障但能悟入聲聞緣覺未能顯住菩薩境界五性中此當第一聲聞性第二緣覺性此之聲聞緣覺皆是三乘之數於中聲聞乃聞佛三轉四諦法門而悟道當二乘中鈍根之人所以華嚴經云隨他語解故號聲聞辟支迦此云緣覺此人出無佛世但觀四時遷變代謝而悟道更不假師繩所以道春觀百華開秋觀黃葉落此當二觀恐乘中一利根者也此二乘之性不先求了悟覺性但知生死苦遂止息攀緣先除事障已除我執尚有法執理障未除雖云超出三界於台教四土之中約居方便土未到菩薩境界此人一向厭下苦多障欣上淨妙離也善男子若諸末世一切眾生欲泛如來大圓覺海先當發願勤斷二障二障已伏即能悟入菩薩境界若事理障已永斷滅即入如來微妙圓覺滿足菩提及大涅槃此第三菩薩性先當發顧者似令修證不是分別五性此譯人之訛今文只要分別出五性差別不同當云唯先發願又悟入者當作順入此中亦只先願斷障不先了心未覺了真性而二障又已伏之不行此當地前菩薩霍伏自然潛同菩薩故云順入永斷者此約地上果位蓋地上方䨥斷也大涅槃者即無住處大涅槃也善男子一切眾生皆證圓覺逢善知識依彼所作因地法行爾時修習便有頓漸若遇如來無上菩提正修行路根無大小皆成佛果此第四不定性問既是四生九類已皆證入十方如來圓覺了何故更要依倚善知識所教示修習因地法門耶據圭峯注以謂譯師訛之當云證諸眾生皆有圓覺謂吾佛大聖人普為一切眾生保任作證人人具有此廣大靈明圓覺之性此之性上本無菩提可求下無眾生可度中無萬行可修所以道人人壁立千仞箇箇常光現前一道恩光何人無分人人并眉佛祖各各鼻孔遼天本來具足本來無闕但以妄想執著而不證得於是有褁粮笈撥草瞻風尋師訪道之事或逢箇知真識妄知病識藥底善知識之教因修心地法門行稱性法行也若遇頓師教之則成頓證若遇漸師教之則成漸證然彼眾生覺性之體與佛一般初無頓漸也若遇如來之教並許成佛良由此不定性之人遇善則善遇惡則惡如一張白紙相似褁香則香褁臭則臭孟子所謂人之性其猶於水決諸東則東流決諸西則西流論語所謂中人已上可以語上也可以語下也老子謂中士聞道若存若亡也又如大智度論云昔王不立廐於寺者謂此王有象可敵諸國每有爭戰莊嚴器杖令象前戰無不克勝而諸國皆懼久而無敵遂立廐養僧寺之久聞僧眾持念之聲其象遂乃心善後有敵國兵眾相侵依前以象前敵其象都不肯戰其王憂愁慮國衰敗有智臣白王言此象久處僧舍見聞善事與之俱化矣今可移處屠坊令常見殺住未經久其象惡心還起畜生尚爾況復於人近善不善近惡不惡耶故儒典亦常令學者擇其所習可不信哉若諸眾生雖求善友遇邪見者未得正悟是則名為外道種性邪師過謬非眾生咎此第五外道性此有二義故若約事則西天有九十六種外道若約理則心遊理外便謂之外道不必六師也邪師過謬者謂眾生覺性本同諸佛正覺之性但是遇著邪師熏成雜種謂之外道此非眾生之過乃邪師妄謬之過所以道我眼本正因師故邪故仁王經云天羅國有一太子名班足登位時有一外道名善施與王灌頂乃令班足取千王頭以祀家間摩訶迦羅大黑天神班足自登位已得九百九十九王唯少一王地行萬里見一王名普明班足欲取之普明乃曰願聽一日禮敬三寶飯食沙門班足許之普明遂敷百高座請百法師一日二時講說般若班足聞已即證空定遂告諸王言我為外道邪師所誤非汝等咎因以國付弟出家得果是知修行之人創初發意起心宜須揀擇邪正也是名眾生五性差別此結答彌勒前問世尊云於諸輪迴有幾種性今答有五種差別不同也善男子菩薩唯以大悲方便入諸世間開發未悟乃至示現種種形相逆順境界與其同事化令成佛皆依無始清淨願力若諸末世一切眾生於大圓覺起增上心當發菩薩清淨大願應作是言願我今者住佛圓覺求善知識莫值外道及與二乘依願修行漸斷諸障障盡願滿便登解脫清淨法殿證大圓覺妙莊嚴城爾時世尊欲重宣此義而說偈言此答前問修佛菩提幾等差別今答云一切眾生於十方諸佛廣大圓覺性中發起決定趣向殊勝增上心更當發菩薩清淨大願願我修此圓覺求知真識妄知病識藥之人誓願決定不隨前五性中外道及小乘之人依發願之力修行問今經屬頓教何云漸斷障耶銷答若據理則頓悟乘悟併事非頓除因次第盡所以漸斷諸障障盡則行住臥一切時中觸向無非大解脫門故以法殿況之願滿則觸目對境一切諸法無非是大圓覺故以莊嚴域喻之問法殿與妙莊嚴域何異耶答殿者乃王者之所居處今借用之然法王宮殿有二若受法樂即涅槃若令他同己即處慈悲宮殿今障盡常在解脫故喻如殿如華嚴第一卷中初以宮殿喻於涅槃涅槃者即解脫故解脫曰殿莊嚴者此未證真法之時但空但假然圓覺超絕空假逈然獨立不名涅槃今願滿全證一境三諦一心三觀觀諦無二故諸法無非圓覺而圓覺性中具此無量無數一切諸法是莊嚴覺性也域者如國界王都三京觸目皆是圓覺壃界境域然解脫是一向超絕之義那莊嚴之流類圓覺與諸法本末相攝離於諸法無別所在無可住處故與宮殿亦非流類以此二事各喻一法可見也問前彌勒請問者先問大智即修佛菩提幾等差別文次問大悲即迴入塵勞文今佛何故先答悲而後答智耶答悲智相即故若智不即悲者為小乘觀智之所寂遂見三界無安猶如火宅希求出離如救頭然如獐獨跳不顧後群若悲不即智者在在處處不能離相起貪愛心即落凡夫愛見如楞嚴云我愛汝色汝怜我心以是因緣百劫千生常在纏縛若智即悲者不為小乘觀智之所寂不妨在生死界中度脫眾生饒益群品悲即智者不為凡夫愛見之所動終日度生而不見有眾生可度也如金剛經前三紙經文教示行人悲智相即同意彼文從一切眾生之類至而滅度之此正發大悲心又從如是滅度至得滅度者此兼發大智心此乃是悲即智又從復次須菩提不住於相此不住色與不住相皆正發大智心布施二字兼發大悲心此乃智即悲然對彼經文可解今意也彌勒汝當知一切諸眾生不得大解脫皆由貪欲故墮落於生死若能斷憎愛及與貪瞋癡不因差別性皆得成佛道二障永消滅求師得正悟隨順菩薩願依止大涅槃十方諸菩薩皆以大悲願示現入生死現在修行者及末世眾生勤斷諸愛見便皈大圓覺
